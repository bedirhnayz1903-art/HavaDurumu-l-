<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hava Durumu</title>
<style>
  :root{
    --ink:#1c2230;
    --ink-soft:#5b6478;
    --line: rgba(28,34,48,0.10);
    --paper:#f6f7f5;
    --card:#ffffff;
    --accent:#2e6f6a;
    --accent-soft: rgba(46,111,106,0.12);
    --sun:#d98c2b;
    --shadow: 0 1px 2px rgba(20,24,34,0.04);
  }
  html[data-theme="dark"]{
    --ink:#eef0f4;
    --ink-soft:#9aa3b8;
    --line: rgba(255,255,255,0.08);
    --paper:#11141c;
    --card:#191d28;
    --accent:#5fbab2;
    --accent-soft: rgba(95,186,178,0.14);
    --sun:#e8a23e;
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--paper);
    color:var(--ink);
    font-family: 'Iosevka', 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    transition: background .25s, color .25s;
  }
  body{
    display:flex;
    justify-content:center;
    padding: 20px 16px 60px;
  }
  .app{
    width:100%;
    max-width:480px;
  }
  button{ font-family:inherit; }

  /* ---- Top bar ---- */
  .top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:18px;
    gap:10px;
  }
  .place{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:27px;
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.1;
  }
  .place-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    letter-spacing:0.02em;
  }
  .top-controls{
    display:flex;
    gap:8px;
    flex-shrink:0;
  }
  .icon-btn{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:9px;
    width:36px; height:36px;
    color:var(--ink-soft);
    font-size:15px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: background .15s, transform .4s, color .15s;
    box-shadow:var(--shadow);
  }
  .icon-btn:hover{ background:var(--accent-soft); color:var(--accent); }
  .icon-btn.spin:active{ transform: rotate(180deg); }

  .unit-toggle{
    display:flex;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:9px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .unit-toggle button{
    border:none;
    background:transparent;
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
    width:32px; height:36px;
    cursor:pointer;
    transition: background .15s, color .15s;
  }
  .unit-toggle button.active{
    background:var(--accent);
    color:#fff;
  }

  /* ---- View tabs (Full / Widget) ---- */
  .view-tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .view-tabs button{
    flex:1;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:9px;
    padding:9px 0;
    font-size:11.5px;
    font-weight:600;
    letter-spacing:0.03em;
    color:var(--ink-soft);
    cursor:pointer;
    transition: background .15s, color .15s;
  }
  .view-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* ---- Hero ---- */
  .hero{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:26px 22px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .hero-row{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .hero-icon{ font-size:54px; line-height:1; }
  .hero-temp{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:60px;
    font-weight:600;
    letter-spacing:-0.02em;
  }
  .hero-temp sup{ font-size:26px; font-weight:400; top:-0.6em; }
  .hero-desc{
    font-size:14px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .hero-feels{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:10px;
    border-top:1px dashed var(--line);
    padding-top:10px;
    display:flex;
    justify-content:space-between;
  }
  .updated-at{
    position:absolute;
    top:16px; right:18px;
    font-size:10px;
    color:var(--ink-soft);
    opacity:0.7;
    letter-spacing:0.03em;
  }

  /* ---- Stat grid ---- */
  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:22px;
  }
  .stat{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 6px;
    text-align:center;
    box-shadow:var(--shadow);
  }
  .stat-label{
    font-size:8.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .stat-value{
    font-size:15px;
    font-weight:600;
  }

  /* ---- Section label ---- */
  .section-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin: 6px 2px 10px;
  }

  /* ---- Hourly ---- */
  .hourly{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:24px;
    scrollbar-width:none;
  }
  .hourly::-webkit-scrollbar{ display:none; }
  .hour-card{
    flex:0 0 auto;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 10px;
    text-align:center;
    min-width:58px;
    box-shadow:var(--shadow);
  }
  .hour-card.now{
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .hour-time{ font-size:10px; color:var(--ink-soft); margin-bottom:6px; }
  .hour-icon{ font-size:22px; margin-bottom:6px; }
  .hour-temp{ font-size:13px; font-weight:600; }

  /* ---- Daily ---- */
  .daily{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    margin-bottom:10px;
    box-shadow:var(--shadow);
  }
  .day-row{
    display:flex;
    align-items:center;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    gap:12px;
  }
  .day-row:last-child{ border-bottom:none; }
  .day-name{
    font-size:13px;
    font-weight:600;
    width:64px;
    flex-shrink:0;
  }
  .day-icon{ font-size:18px; width:26px; text-align:center; flex-shrink:0; }
  .day-bar-wrap{
    flex:1;
    height:4px;
    background:var(--line);
    border-radius:2px;
    position:relative;
  }
  .day-bar{
    position:absolute;
    height:4px;
    border-radius:2px;
    background:linear-gradient(90deg, var(--accent), var(--sun));
  }
  .day-range{
    font-size:12px;
    color:var(--ink-soft);
    width:72px;
    text-align:right;
    flex-shrink:0;
  }
  .day-range b{ color:var(--ink); }

  /* ---- Widget mode ---- */
  .widget-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  .widget{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .widget.wide{ grid-column: 1 / 3; }
  .widget-title{
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
  }
  .widget-now{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .widget-now .icon{ font-size:38px; }
  .widget-now .temp{
    font-family: Georgia, serif;
    font-size:34px;
    font-weight:600;
  }
  .widget-now .desc{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .widget-minmax{
    margin-top:10px;
    font-size:12px;
    color:var(--ink-soft);
  }
  .widget-minmax b{ color:var(--ink); }

  .widget-hourly-strip{
    display:flex;
    justify-content:space-between;
    margin-top:4px;
  }
  .whs-item{ text-align:center; flex:1; }
  .whs-item .t{ font-size:9px; color:var(--ink-soft); }
  .whs-item .i{ font-size:18px; margin:4px 0; }
  .whs-item .v{ font-size:12px; font-weight:600; }

  .widget-stat-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .widget-stat-row .v{ font-size:22px; font-weight:600; }
  .widget-stat-row .l{ font-size:9px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; }

  .widget-mini-icon{ font-size:24px; opacity:0.85; }

  .widget-7day{
    display:flex;
    justify-content:space-between;
    margin-top:2px;
  }
  .w7-item{ text-align:center; flex:1; }
  .w7-item .d{ font-size:9px; color:var(--ink-soft); margin-bottom:6px; }
  .w7-item .i{ font-size:15px; margin-bottom:4px; }
  .w7-item .mx{ font-size:11px; font-weight:600; }
  .w7-item .mn{ font-size:10px; color:var(--ink-soft); }

  /* ---- States ---- */
  .state-box{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    font-size:13px;
  }
  .state-box .big{ font-size:34px; margin-bottom:14px; }
  .state-box .title{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:8px;
  }
  .state-box p{ max-width:320px; margin:0 auto; line-height:1.5; }
  .ask-btn{
    margin-top:18px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:10px;
    padding:11px 24px;
    font-size:13px;
    font-family:inherit;
    font-weight:600;
    cursor:pointer;
  }
  .ask-btn:hover{ opacity:0.88; }
  .ask-btn.secondary{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line);
    margin-top:8px;
  }
  .steps{
    text-align:left;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin:16px auto 0;
    max-width:320px;
    font-size:12px;
    line-height:1.7;
    color:var(--ink-soft);
  }
  .steps b{ color:var(--ink); }

  .hidden{ display:none !important; }

  footer{
    text-align:center;
    font-size:10px;
    color:var(--ink-soft);
    opacity:0.6;
    margin-top:18px;
    letter-spacing:0.03em;
  }

  @media (max-width:380px){
    .hero-temp{ font-size:50px; }
    .place{ font-size:23px; }
    .stats{ grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="app">

  <div id="loadingState" class="state-box">
    <div class="big">⟳</div>
    <div class="title">Konum belirleniyor</div>
    <p>Hava durumunu gösterebilmek için tarayıcının konum izni isteniyor…</p>
  </div>

  <div id="errorState" class="state-box hidden">
    <div class="big" id="errorIcon">⚠</div>
    <div class="title" id="errorTitle">Konum alınamadı</div>
    <p id="errorMsg">Bir sorun oluştu.</p>
    <div id="errorSteps" class="steps hidden"></div>
    <button class="ask-btn" onclick="init()">Tekrar dene</button>
  </div>

  <div id="content" class="hidden">

    <div class="top">
      <div>
        <div class="place" id="placeName">—</div>
        <div class="place-sub" id="placeSub">—</div>
      </div>
      <div class="top-controls">
        <div class="unit-toggle">
          <button id="unitC" class="active" onclick="setUnit('C')">°C</button>
          <button id="unitF" onclick="setUnit('F')">°F</button>
        </div>
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Tema değiştir">◐</button>
        <button class="icon-btn spin" onclick="init()" title="Yenile">⟳</button>
      </div>
    </div>

    <div class="view-tabs">
      <button id="tabFull" class="active" onclick="setView('full')">Tam Görünüm</button>
      <button id="tabWidget" onclick="setView('widget')">Widget</button>
    </div>

    <!-- FULL VIEW -->
    <div id="fullView">
      <div class="hero">
        <div class="updated-at" id="updatedAt"></div>
        <div class="hero-row">
          <div class="hero-icon" id="heroIcon">☀️</div>
          <div>
            <div class="hero-temp" id="heroTemp">—<sup>°</sup></div>
            <div class="hero-desc" id="heroDesc">—</div>
          </div>
        </div>
        <div class="hero-feels">
          <span>Hissedilen: <b id="feelsVal">—</b></span>
          <span id="todayMinMax">—</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Rüzgar</div>
          <div class="stat-value" id="statWind">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Nem</div>
          <div class="stat-value" id="statHumidity">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Yağış İht.</div>
          <div class="stat-value" id="statRain">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Basınç</div>
          <div class="stat-value" id="statPressure">—</div>
        </div>
      </div>

      <div class="section-label">Saatlik</div>
      <div class="hourly" id="hourlyRow"></div>

      <div class="section-label">7 Günlük Tahmin</div>
      <div class="daily" id="dailyList"></div>
    </div>

    <!-- WIDGET VIEW -->
    <div id="widgetView" class="hidden">
      <div class="widget-grid">
        <div class="widget wide">
          <div class="widget-title"><span id="wTitle">—</span><span id="wTime">—</span></div>
          <div class="widget-now">
            <div>
              <div class="temp" id="wTemp">—°</div>
              <div class="desc" id="wDesc">—</div>
            </div>
            <div class="icon" id="wIcon">☀️</div>
          </div>
        </div>

        <div class="widget">
          <div class="widget-title">Rüzgar</div>
          <div class="widget-stat-row">
            <div class="v" id="wWind">—</div>
            <div class="widget-mini-icon">💨</div>
          </div>
        </div>

        <div class="widget">
          <div class="widget-title">Nem</div>
          <div class="widget-stat-row">
            <div class="v" id="wHumidity">—</div>
            <div class="widget-mini-icon">💧</div>
          </div>
        </div>

        <div class="widget wide">
          <div class="widget-title">Saatlik</div>
          <div class="widget-hourly-strip" id="wHourly"></div>
        </div>

        <div class="widget wide">
          <div class="widget-title">5 Günlük</div>
          <div class="widget-7day" id="w7day"></div>
        </div>
      </div>
    </div>

    <footer>Veri kaynağı: Open-Meteo</footer>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let state = {
  unit: 'C',          // 'C' | 'F'
  view: 'full',        // 'full' | 'widget'
  theme: 'light',
  weatherData: null,
  place: null
};

// ---------- Tema ----------
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  $('themeBtn') && ($('themeBtn').textContent = state.theme === 'dark' ? '☾' : '◐');
}
function toggleTheme(){
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  try{ localStorage.setItem('weatherTheme', state.theme); }catch(e){}
}
function setView(v){
  state.view = v;
  $('tabFull').classList.toggle('active', v === 'full');
  $('tabWidget').classList.toggle('active', v === 'widget');
  $('fullView').classList.toggle('hidden', v !== 'full');
  $('widgetView').classList.toggle('hidden', v !== 'widget');
}
function setUnit(u){
  state.unit = u;
  $('unitC').classList.toggle('active', u === 'C');
  $('unitF').classList.toggle('active', u === 'F');
  if(state.weatherData) renderWeather(state.weatherData, state.place);
}
function c2f(c){ return c * 9/5 + 32; }
function fmtTemp(c, withUnit=true){
  const v = state.unit === 'F' ? c2f(c) : c;
  return Math.round(v) + (withUnit ? '°' : '');
}

// ---------- WMO weather code -> emoji + açıklama ----------
function weatherInfo(code, isDay){
  const map = {
    0:  ['☀️','Açık', '🌙'],
    1:  ['🌤️','Genelde açık', '🌙'],
    2:  ['⛅','Parçalı bulutlu', '☁️'],
    3:  ['☁️','Bulutlu', '☁️'],
    45: ['🌫️','Sisli', '🌫️'],
    48: ['🌫️','Kırağı sisi', '🌫️'],
    51: ['🌦️','Hafif çisenti', '🌦️'],
    53: ['🌦️','Çisenti', '🌦️'],
    55: ['🌧️','Yoğun çisenti', '🌧️'],
    56: ['🌧️','Dondurucu çisenti', '🌧️'],
    57: ['🌧️','Yoğun dondurucu çisenti', '🌧️'],
    61: ['🌧️','Hafif yağmur', '🌧️'],
    63: ['🌧️','Yağmur', '🌧️'],
    65: ['🌧️','Şiddetli yağmur', '🌧️'],
    66: ['🌧️','Dondurucu yağmur', '🌧️'],
    67: ['🌧️','Şiddetli dondurucu yağmur', '🌧️'],
    71: ['🌨️','Hafif kar', '🌨️'],
    73: ['🌨️','Kar', '🌨️'],
    75: ['❄️','Yoğun kar', '❄️'],
    77: ['❄️','Kar taneleri', '❄️'],
    80: ['🌦️','Hafif sağanak', '🌦️'],
    81: ['🌧️','Sağanak', '🌧️'],
    82: ['⛈️','Şiddetli sağanak', '⛈️'],
    85: ['🌨️','Hafif kar sağanağı', '🌨️'],
    86: ['❄️','Yoğun kar sağanağı', '❄️'],
    95: ['⛈️','Gök gürültülü fırtına', '⛈️'],
    96: ['⛈️','Dolu ile fırtına', '⛈️'],
    99: ['⛈️','Şiddetli dolu fırtınası', '⛈️'],
  };
  const entry = map[code] || ['☁️','Bilinmiyor', '☁️'];
  const icon = isDay === 0 ? entry[2] : entry[0];
  return { icon, desc: entry[1] };
}

function dayLabel(dateStr, idx){
  if(idx === 0) return 'Bugün';
  const days = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
  const d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()];
}
function hourLabel(dt){
  const d = new Date(dt);
  return d.getHours().toString().padStart(2,'0') + ':00';
}

function showState(s, opts={}){
  $('loadingState').classList.toggle('hidden', s !== 'loading');
  $('errorState').classList.toggle('hidden', s !== 'error');
  $('content').classList.toggle('hidden', s !== 'content');
  if(s === 'error'){
    $('errorTitle').textContent = opts.title || 'Bir sorun oluştu';
    $('errorMsg').textContent = opts.msg || '';
    $('errorIcon').textContent = opts.icon || '⚠';
    if(opts.steps){
      $('errorSteps').innerHTML = opts.steps;
      $('errorSteps').classList.remove('hidden');
    } else {
      $('errorSteps').classList.add('hidden');
    }
  }
}

// ---------- Reverse geocode ----------
async function reverseGeocode(lat, lon){
  try{
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=tr&format=json`);
    const data = await res.json();
    if(data.results && data.results.length){
      const r = data.results[0];
      return {
        name: r.name || 'Bilinmeyen konum',
        sub: [r.admin1, r.country].filter(Boolean).join(', ')
      };
    }
  }catch(e){ /* sessiz geç */ }
  return { name: `${lat.toFixed(2)}, ${lon.toFixed(2)}`, sub: 'Konum adı bulunamadı' };
}

// ---------- Hava durumu verisi ----------
async function fetchWeather(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,is_day,surface_pressure` +
    `&hourly=temperature_2m,weather_code,is_day` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
    `&timezone=auto&forecast_days=7`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Hava durumu verisi alınamadı.');
  return res.json();
}

// ---------- Render: Full + Widget ----------
function renderWeather(data, place){
  $('placeName').textContent = place.name;
  $('placeSub').textContent = place.sub;

  const cur = data.current;
  const info = weatherInfo(cur.weather_code, cur.is_day);

  // --- FULL VIEW ---
  $('heroIcon').textContent = info.icon;
  $('heroTemp').innerHTML = fmtTemp(cur.temperature_2m, false) + '<sup>°' + state.unit + '</sup>';
  $('heroDesc').textContent = info.desc;
  $('feelsVal').textContent = fmtTemp(cur.apparent_temperature) + state.unit;

  const todayMax = data.daily.temperature_2m_max[0];
  const todayMin = data.daily.temperature_2m_min[0];
  $('todayMinMax').innerHTML = `↑${fmtTemp(todayMax)} ↓${fmtTemp(todayMin)}`;

  $('statWind').textContent = Math.round(cur.wind_speed_10m) + ' km/s';
  $('statHumidity').textContent = Math.round(cur.relative_humidity_2m) + '%';
  $('statRain').textContent = (data.daily.precipitation_probability_max[0] ?? 0) + '%';
  $('statPressure').textContent = Math.round(cur.surface_pressure ?? 0) + ' hPa';

  const now = new Date();
  $('updatedAt').textContent = 'Güncellendi: ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  // Saatlik (Full)
  const hourly = data.hourly;
  const nowIso = data.current.time;
  let startIdx = hourly.time.findIndex(t => t >= nowIso);
  if(startIdx === -1) startIdx = 0;

  const hourlyRow = $('hourlyRow');
  hourlyRow.innerHTML = '';
  for(let i = startIdx; i < Math.min(startIdx + 12, hourly.time.length); i++){
    const hInfo = weatherInfo(hourly.weather_code[i], hourly.is_day[i]);
    const card = document.createElement('div');
    card.className = 'hour-card' + (i === startIdx ? ' now' : '');
    card.innerHTML = `
      <div class="hour-time">${i === startIdx ? 'Şimdi' : hourLabel(hourly.time[i])}</div>
      <div class="hour-icon">${hInfo.icon}</div>
      <div class="hour-temp">${fmtTemp(hourly.temperature_2m[i])}</div>
    `;
    hourlyRow.appendChild(card);
  }

  // 7 günlük (Full)
  const daily = data.daily;
  const allMax = Math.max(...daily.temperature_2m_max);
  const allMin = Math.min(...daily.temperature_2m_min);
  const range = allMax - allMin || 1;

  const dailyList = $('dailyList');
  dailyList.innerHTML = '';
  for(let i = 0; i < daily.time.length; i++){
    const dInfo = weatherInfo(daily.weather_code[i], 1);
    const max = daily.temperature_2m_max[i];
    const min = daily.temperature_2m_min[i];
    const leftPct = ((min - allMin) / range) * 100;
    const widthPct = ((max - min) / range) * 100;

    const row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `
      <div class="day-name">${dayLabel(daily.time[i], i)}</div>
      <div class="day-icon">${dInfo.icon}</div>
      <div class="day-bar-wrap">
        <div class="day-bar" style="left:${leftPct}%; width:${Math.max(widthPct,6)}%"></div>
      </div>
      <div class="day-range"><b>${fmtTemp(max)}</b> / ${fmtTemp(min)}</div>
    `;
    dailyList.appendChild(row);
  }

  // --- WIDGET VIEW ---
  $('wTitle').textContent = place.name;
  $('wTime').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  $('wTemp').textContent = fmtTemp(cur.temperature_2m);
  $('wDesc').textContent = info.desc + ` · ↑${fmtTemp(todayMax)} ↓${fmtTemp(todayMin)}`;
  $('wIcon').textContent = info.icon;
  $('wWind').textContent = Math.round(cur.wind_speed_10m) + ' km/s';
  $('wHumidity').textContent = Math.round(cur.relative_humidity_2m) + '%';

  const wHourly = $('wHourly');
  wHourly.innerHTML = '';
  for(let i = startIdx; i < Math.min(startIdx + 5, hourly.time.length); i += 1){
    const hInfo = weatherInfo(hourly.weather_code[i], hourly.is_day[i]);
    const item = document.createElement('div');
    item.className = 'whs-item';
    item.innerHTML = `
      <div class="t">${i === startIdx ? 'Şimdi' : hourLabel(hourly.time[i])}</div>
      <div class="i">${hInfo.icon}</div>
      <div class="v">${fmtTemp(hourly.temperature_2m[i])}</div>
    `;
    wHourly.appendChild(item);
  }

  const w7day = $('w7day');
  w7day.innerHTML = '';
  for(let i = 0; i < Math.min(5, daily.time.length); i++){
    const dInfo = weatherInfo(daily.weather_code[i], 1);
    const item = document.createElement('div');
    item.className = 'w7-item';
    item.innerHTML = `
      <div class="d">${dayLabel(daily.time[i], i)}</div>
      <div class="i">${dInfo.icon}</div>
      <div class="mx">${fmtTemp(daily.temperature_2m_max[i])}</div>
      <div class="mn">${fmtTemp(daily.temperature_2m_min[i])}</div>
    `;
    w7day.appendChild(item);
  }
}

// ---------- Konum izni & hata yönetimi ----------
function isSecureContextOk(){
  // Geolocation API, HTTPS olmayan (ve localhost dışındaki) sayfalarda
  // tarayıcı tarafından otomatik engellenir ve izin penceresi hiç açılmaz.
  return window.isSecureContext === true;
}

async function checkPermissionState(){
  if(!('permissions' in navigator)) return 'unknown';
  try{
    const status = await navigator.permissions.query({ name: 'geolocation' });
    return status.state; // 'granted' | 'denied' | 'prompt'
  }catch(e){
    return 'unknown';
  }
}

async function init(){
  showState('loading');

  if(!navigator.geolocation){
    showState('error', {
      title: 'Konum desteklenmiyor',
      msg: 'Bu tarayıcı konum servisini desteklemiyor.',
      icon: '⚠'
    });
    return;
  }

  if(!isSecureContextOk()){
    showState('error', {
      title: 'Güvenli bağlantı gerekli',
      icon: '🔒',
      msg: 'Tarayıcılar, konum izni isteyebilmek için sayfanın HTTPS (veya localhost) üzerinden açılmasını zorunlu kılar. Şu an bu sayfa güvenli bir bağlantı üzerinden açılmadığı için izin penceresi hiç görünmüyor.',
      steps: `<b>Çözüm:</b><br>1. Dosyayı bir HTTPS sunucusunda barındır (örn. GitHub Pages, Netlify, Vercel).<br>2. Ya da yerel test için <code>localhost</code> üzerinden aç.<br>3. Gerçek cihazda test ediyorsan, dosyayı doğrudan açmak yerine bir web sunucusundan servis et.`
    });
    return;
  }

  const permState = await checkPermissionState();

  if(permState === 'denied'){
    showState('error', {
      title: 'Konum izni engellenmiş',
      icon: '🚫',
      msg: 'Bu site için konum izni daha önce reddedilmiş. Tarayıcı, izni daha önce verdiğin/reddettiğin siteler için bir daha otomatik sormaz — izni manuel olarak değiştirmen gerekiyor.',
      steps: `<b>Nasıl açılır:</b><br>1. Adres çubuğundaki kilit/site bilgisi simgesine dokun.<br>2. <b>İzinler</b> veya <b>Konum</b> ayarını bul.<br>3. <b>İzin ver</b> olarak değiştir.<br>4. Sayfayı yenile ve tekrar dene.`
    });
    return;
  }

  // 'prompt' veya 'unknown' durumunda gerçek izin isteğini tetikle
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try{
        const { latitude, longitude } = pos.coords;
        const [place, weather] = await Promise.all([
          reverseGeocode(latitude, longitude),
          fetchWeather(latitude, longitude)
        ]);
        state.weatherData = weather;
        state.place = place;
        renderWeather(weather, place);
        showState('content');
      }catch(err){
        showState('error', {
          title: 'Veri alınamadı',
          msg: 'Konumun belirlendi ama hava durumu sunucusuna ulaşılamadı. İnternet bağlantını kontrol edip tekrar dene.',
          icon: '📡'
        });
      }
    },
    (err) => {
      // GeolocationPositionError kodları: 1=PERMISSION_DENIED, 2=POSITION_UNAVAILABLE, 3=TIMEOUT
      if(err.code === 1){
        showState('error', {
          title: 'İzin verilmedi',
          icon: '🚫',
          msg: 'Konum izni penceresinde "İzin verme" seçildi. Hava durumunu gösterebilmek için konuma erişim izni gerekiyor.',
          steps: `<b>Yeniden izin vermek için:</b><br>1. Adres çubuğundaki site simgesine dokun.<br>2. Konum iznini <b>İzin ver</b> yap.<br>3. "Tekrar dene"ye bas.`
        });
      } else if(err.code === 2){
        showState('error', {
          title: 'Konum bulunamadı',
          icon: '📍',
          msg: 'Cihazın konumu belirlenemedi (GPS/konum servisi kapalı olabilir). Cihaz ayarlarından konum servisinin açık olduğunu kontrol et.',
        });
      } else {
        showState('error', {
          title: 'Zaman aşımı',
          icon: '⏱',
          msg: 'Konum belirleme işlemi zaman aşımına uğradı. Tekrar dene.',
        });
      }
    },
    { enableHighAccuracy: false, timeout: 12000, maximumAge: 5 * 60 * 1000 }
  );
}

// ---------- Başlangıç ----------
(function bootstrap(){
  try{
    const savedTheme = localStorage.getItem('weatherTheme');
    if(savedTheme) state.theme = savedTheme;
    else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){
      state.theme = 'dark';
    }
  }catch(e){}
  applyTheme();
  init();
})();
</script>
