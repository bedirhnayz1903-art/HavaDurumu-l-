<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mahalle Ligi: Neon Menajer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');

  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body {
    background: #050505;
    color: #e5e7eb;
    font-family: 'Rajdhani', sans-serif;
    overscroll-behavior: none;
    user-select: none;
    margin: 0; padding: 0;
  }
  
  /* NEON & GOTHIC AESTHETICS */
  :root {
    --neon-green: #39ff88;
    --neon-purple: #b026ff;
    --dark-bg: #090a0f;
    --card-bg: #11131a;
    --border-color: #1f222e;
  }

  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; background: radial-gradient(circle at top, #111827 0%, #050505 100%); }
  
  .screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 90px 16px; }
  .screen::-webkit-scrollbar { display: none; }
  
  /* NAVIGATION */
  .bottom-nav { display: flex; background: rgba(9, 10, 15, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); position: absolute; bottom: 0; left: 0; right: 0; z-index: 40; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 2px; gap: 4px; color: #4b5563; font-size: 11px; font-weight: 600; transition: all .3s; text-transform: uppercase; letter-spacing: 1px; }
  .nav-btn.active { color: var(--neon-green); text-shadow: 0 0 8px rgba(57,255,136,0.4); }
  .nav-icon { font-size: 20px; }
  
  /* CARDS & BUTTONS */
  .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--border-color); transition: .3s; }
  .card:hover::before { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
  
  .accent-text { color: var(--neon-green); text-shadow: 0 0 5px rgba(57,255,136,0.3); }
  
  .btn-primary { background: transparent; color: var(--neon-green); font-weight: 700; border: 1px solid var(--neon-green); border-radius: 8px; padding: 12px 16px; text-align: center; text-transform: uppercase; letter-spacing: 1px; box-shadow: inset 0 0 10px rgba(57,255,136,0.1), 0 0 10px rgba(57,255,136,0.1); transition: all .2s; cursor: pointer; width: 100%; }
  .btn-primary:active { transform: scale(0.96); background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
  
  .btn-action { background: #1a1f2e; color: #fff; border: 1px solid #2d3748; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: .2s; }
  .btn-action:active { transform: scale(0.95); border-color: var(--neon-purple); color: var(--neon-purple); }

  /* UTILS */
  .stat-bar-track { background: #1a1f2e; border-radius: 4px; height: 8px; width: 100%; overflow: hidden; border: 1px solid #2d3748; }
  .stat-bar-fill { height: 100%; transition: width 0.3s ease; }
  
  .modal-overlay { position: absolute; inset: 0; background: rgba(5,5,5,0.95); z-index: 50; display: flex; flex-direction: column; }
  .toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #090a0f; border: 1px solid var(--neon-purple); color: var(--neon-purple); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 700; z-index: 60; box-shadow: 0 0 15px rgba(176,38,255,0.2); letter-spacing: 1px; }
  
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  
  .log-entry { padding: 6px 0; border-bottom: 1px dashed #1f222e; font-family: -apple-system, sans-serif; }
  .pulse { animation: pulseAnim 1.5s infinite; }
  @keyframes pulseAnim { 0%,100%{opacity:1;} 50%{opacity:.5;} }
</style>
</head>
<body>

<div id="app">
  <div id="screen-container" class="screen"></div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <nav class="bottom-nav">
    <div class="nav-btn" data-tab="home" onclick="switchTab('home')">
      <span class="nav-icon">🏟️</span><span>Kulüp</span>
    </div>
    <div class="nav-btn" data-tab="squad" onclick="switchTab('squad')">
      <span class="nav-icon">⚡</span><span>Kadro</span>
    </div>
    <div class="nav-btn" data-tab="facilities" onclick="switchTab('facilities')">
      <span class="nav-icon">🏗️</span><span>Tesisler</span>
    </div>
    <div class="nav-btn" data-tab="market" onclick="switchTab('market')">
      <span class="nav-icon">🤝</span><span>Market</span>
    </div>
    <div class="nav-btn" data-tab="league" onclick="switchTab('league')">
      <span class="nav-icon">🏆</span><span>Lig</span>
    </div>
  </nav>
</div>

<script>
/* =========================================================
   MAHALLE LİGİ: NEON MENAJER (GELİŞMİŞ SÜRÜM)
   ========================================================= */

const POZISYONLAR = ["KL", "DEF", "ORT", "FOR"];
const TAKIM_ISIMLERI = ["Siyah Beyaz FK", "Kızıltepe İdman", "Neon Yıldızlar", "Karakartal Gençlik", "Gölge United", "Cyber Şehir", "Demir Kanatlar", "Zehir SK"];
const SPONSORLAR = [
  { id: 's1', ad: 'Turbo Enerji İçeceği', pesinat: 2000, haftalik: 400, aciklama: 'Düşük peşinat, sabit güvenilir gelir.' },
  { id: 's2', ad: 'Neon Tech Donanım', pesinat: 5000, haftalik: 150, aciklama: 'Yüksek peşinat, düşük haftalık.' },
  { id: 's3', ad: 'Sokak Giyim A.Ş.', pesinat: 3000, haftalik: 300, aciklama: 'Dengeli sözleşme.' }
];

let state = {
  menajer: "Bedo",
  kulupAdi: "Siyah Beyaz FK",
  butce: 10000,
  hafta: 1,
  toplamHafta: 14, // 8 takım, çift devreli
  biletFiyati: 30,
  taraftarSayisi: 1000,
  aktifSponsor: null,
  kadro: [],
  transferListesi: [],
  altyapiKesfi: false,
  ligTakimlari: [],
  fikstur: [], // Tüm ligin fikstürü
  aktifTab: "home"
};

let macSim = { calisiyor: false, dakika: 0, loglar: [], ev:null, rakip:null, zamanlayici: null, bekleyenMaclar: [] };

/* ---------- KURULUM & YARDIMCI FONKSİYONLAR ---------- */

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function isimUret() {
  const adlar = ["Mert","Kaan","Berat","Eren","Caner","Arda","Barış","Doğukan","Cem","Ufuk","Sinan","Volkan"];
  const soyadlar = ["Yılmaz","Demir","Kaya","Çelik","Şahin","Aslan","Polat","Özdemir","Avcı","Tekin"];
  return adlar[rnd(0, adlar.length-1)] + " " + soyadlar[rnd(0, soyadlar.length-1)];
}

function oyuncuUret(poz, minGuc, maxGuc, ozelAd = null) {
  const p = poz || POZISYONLAR[rnd(0,3)];
  const taban = rnd(minGuc, maxGuc);
  return {
    id: 'p' + Math.random().toString(36).substr(2, 9),
    ad: ozelAd || isimUret(),
    pozisyon: p,
    guc: taban,
    kondisyon: rnd(75, 100),
    sakat: false,
    maas: Math.floor(taban * 1.5),
    deger: taban * rnd(100, 150),
    yas: rnd(16, 32)
  };
}

function oyunuKur() {
  // Kadro
  state.kadro.push(oyuncuUret("KL", 60, 75));
  for(let i=0; i<4; i++) state.kadro.push(oyuncuUret("DEF", 55, 75));
  for(let i=0; i<4; i++) state.kadro.push(oyuncuUret("ORT", 55, 75));
  for(let i=0; i<3; i++) state.kadro.push(oyuncuUret("FOR", 55, 80));
  
  // Lig Takımları
  TAKIM_ISIMLERI.forEach((isim, i) => {
    state.ligTakimlari.push({
      id: i===0 ? 'benimTakim' : 't'+i,
      isim: isim,
      isUser: i===0,
      guc: i===0 ? 0 : rnd(55, 85),
      oynanan:0, gal:0, ber:0, mag:0, at:0, ye:0, puan:0
    });
  });
  
  state.kulupAdi = state.ligTakimlari[0].isim;
  fiksturOlustur();
  marketYenile();
  renderEkran();
  updateNav();
}

// 8 Takım Çift Devreli Fikstür (Round Robin)
function fiksturOlustur() {
  let takimlar = state.ligTakimlari.map(t => t.id);
  const toplamHafta = (takimlar.length - 1) * 2;
  state.toplamHafta = toplamHafta;
  
  for (let hafta = 1; hafta <= toplamHafta; hafta++) {
    let haftaMaclari = [];
    let tur = (hafta > takimlar.length - 1) ? hafta - (takimlar.length - 1) : hafta;
    
    // Basit rotasyon (Poligon algoritması mock)
    let temp = [...takimlar];
    let sabit = temp.shift();
    for(let i=0; i<tur-1; i++) temp.unshift(temp.pop());
    let eslesme = [sabit, ...temp];
    
    for(let i=0; i<eslesme.length/2; i++) {
      let ev = eslesme[i];
      let dep = eslesme[eslesme.length - 1 - i];
      if (hafta > takimlar.length - 1) { let t=ev; ev=dep; dep=t; } // 2. devre saha değişimi
      haftaMaclari.push({ ev, dep, oynandi: false, evSkor: 0, depSkor: 0 });
    }
    state.fikstur.push({ hafta, maclar: haftaMaclari });
  }
}

function marketYenile() {
  state.transferListesi = [];
  for(let i=0; i<4; i++) state.transferListesi.push(oyuncuUret(null, 50, 85));
}

function takimGucu(id) {
  if (id === 'benimTakim') {
    let top = 0; let s = 0;
    state.kadro.forEach(p => {
      if(!p.sakat) { top += p.guc * (p.kondisyon/100); s++; }
    });
    return s > 0 ? Math.floor(top/s) : 30;
  }
  return state.ligTakimlari.find(t=>t.id===id).guc;
}

/* ---------- EKRAN YÖNETİMİ ---------- */
function switchTab(tab) { state.aktifTab = tab; renderEkran(); updateNav(); }
function updateNav() {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.aktifTab);
  });
}

function renderEkran() {
  const c = document.getElementById("screen-container");
  if(state.aktifTab==='home') c.innerHTML = scrHome();
  else if(state.aktifTab==='squad') c.innerHTML = scrSquad();
  else if(state.aktifTab==='facilities') c.innerHTML = scrFacilities();
  else if(state.aktifTab==='market') c.innerHTML = scrMarket();
  else if(state.aktifTab==='league') c.innerHTML = scrLeague();
  c.scrollTop = 0;
}

function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast fade-in'; t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

/* ---------- 1. KULÜP EKRANI ---------- */
function scrHome() {
  const guc = takimGucu('benimTakim');
  const haftalikGider = state.kadro.reduce((a,b)=>a+b.maas, 0);
  const siradakiHafta = state.fikstur.find(f => f.maclar.some(m => !m.oynandi));
  let macKarti = `<p class="text-gray-500 text-sm">Sezon Bitti!</p>`;
  
  if (siradakiHafta) {
    const benimMac = siradakiHafta.maclar.find(m => m.ev === 'benimTakim' || m.dep === 'benimTakim');
    const rakipId = benimMac.ev === 'benimTakim' ? benimMac.dep : benimMac.ev;
    const rakip = state.ligTakimlari.find(t => t.id === rakipId);
    macKarti = `
      <div class="flex justify-between items-center mb-4">
        <div class="text-center flex-1"><span class="block font-bold text-lg ${benimMac.ev==='benimTakim'?'accent-text':'text-white'}">${benimMac.ev==='benimTakim' ? state.kulupAdi : rakip.isim}</span><span class="text-xs text-gray-500">Ev Sahibi</span></div>
        <div class="font-bold text-xl text-gray-600 px-2">VS</div>
        <div class="text-center flex-1"><span class="block font-bold text-lg ${benimMac.dep==='benimTakim'?'accent-text':'text-white'}">${benimMac.dep==='benimTakim' ? state.kulupAdi : rakip.isim}</span><span class="text-xs text-gray-500">Deplasman</span></div>
      </div>
      <button onclick="macBaslat()" class="btn-primary">HAFTAYI OYNA ⚽</button>
    `;
  }

  return `
    <div class="fade-in">
      <div class="flex justify-between items-end mb-4">
        <div>
          <h1 class="text-2xl font-bold text-white tracking-wider">${state.kulupAdi}</h1>
          <p class="text-sm text-gray-400">Menajer: <span class="accent-text">${state.menajer}</span> | Hafta ${state.hafta}/${state.toplamHafta}</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-gray-500 uppercase tracking-widest">Kasa</p>
          <p class="text-xl font-bold text-white">${state.butce.toLocaleString('tr-TR')} ₺</p>
        </div>
      </div>

      <div class="card">
        <p class="text-xs text-gray-500 uppercase mb-2">Genel Durum</p>
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm font-bold text-gray-300">Ortalama Güç</span>
          <span class="text-lg font-bold accent-text">${guc}</span>
        </div>
        <div class="stat-bar-track mb-4"><div class="stat-bar-fill" style="width:${guc}%; background:var(--neon-green)"></div></div>
        
        <div class="flex justify-between border-t border-gray-800 pt-2 text-sm">
          <span class="text-gray-400">Maaş Gideri: <span class="text-red-400">-${haftalikGider}₺</span></span>
          <span class="text-gray-400">Taraftar: <span class="text-white">${state.taraftarSayisi}</span></span>
        </div>
      </div>

      <div class="card" style="border-color: var(--neon-green)">
        <p class="text-xs accent-text uppercase mb-3 font-bold tracking-widest">Sıradaki Karşılaşma</p>
        ${macKarti}
      </div>
    </div>
  `;
}

/* ---------- 2. KADRO EKRANI ---------- */
function scrSquad() {
  const list = [...state.kadro].sort((a,b) => b.guc - a.guc);
  const html = list.map(p => `
    <div class="card flex items-center gap-3 ${p.sakat ? 'opacity-70' : ''} mb-2">
      <div class="font-bold text-xs w-8 text-center" style="color:var(--neon-purple)">${p.pozisyon}</div>
      <div class="flex-1">
        <p class="text-sm font-bold text-white">${p.ad} <span class="text-xs text-gray-500 ml-1">Yaş: ${p.yas}</span> ${p.sakat ? '🤕' : ''}</p>
        <div class="flex gap-4 mt-1 text-xs">
          <span>Güç: <b class="${p.guc>75?'accent-text':'text-gray-300'}">${p.guc}</b></span>
          <span>Kond: <b class="${p.kondisyon<50?'text-red-400':'text-gray-300'}">%${p.kondisyon}</b></span>
        </div>
      </div>
      <div class="text-right flex flex-col items-end gap-1">
        <span class="text-xs font-bold text-gray-400">${p.maas}₺</span>
        <button onclick="oyuncuKov('${p.id}')" class="text-[10px] bg-red-900 bg-opacity-30 text-red-400 px-2 py-1 rounded">Gönder</button>
      </div>
    </div>
  `).join("");

  return `<div class="fade-in"><h2 class="text-xl font-bold mb-3 uppercase tracking-wider text-white">A Takım Kadrosu</h2>${html}</div>`;
}

function oyuncuKov(id) {
  if(state.kadro.length <= 11) { toast("Kadroda en az 11 oyuncu kalmalı!"); return; }
  state.kadro = state.kadro.filter(p => p.id !== id);
  toast("Oyuncu takımdan gönderildi."); renderEkran();
}

/* ---------- 3. TESİSLER (ANTRENMAN & ALTYAPI) ---------- */
function scrFacilities() {
  return `
    <div class="fade-in space-y-4">
      <h2 class="text-xl font-bold uppercase tracking-wider text-white">Kulüp Tesisleri</h2>
      
      <div class="card">
        <h3 class="font-bold text-white mb-1 flex items-center gap-2">🏋️ Taktik Antrenman</h3>
        <p class="text-xs text-gray-400 mb-3">Tüm takımın gücünü geliştirmek için özel hoca tut. (Maliyet: 1500₺)</p>
        <button onclick="tesisIslem('antrenman')" class="btn-action w-full">Antrenman Yaptır (1500₺)</button>
      </div>

      <div class="card">
        <h3 class="font-bold text-white mb-1 flex items-center gap-2">🏥 Kulüp Doktoru</h3>
        <p class="text-xs text-gray-400 mb-3">Sakatları iyileştir ve tüm takımın kondisyonunu %100'e fulle. (Maliyet: 800₺)</p>
        <button onclick="tesisIslem('tedavi')" class="btn-action w-full" style="border-color:#38bdf8; color:#38bdf8;">Tedavi Uygula (800₺)</button>
      </div>

      <div class="card" style="border-color: var(--neon-purple)">
        <h3 class="font-bold text-white mb-1 flex items-center gap-2" style="color:var(--neon-purple)">🛹 Mahalle Parkı (Altyapı)</h3>
        <p class="text-xs text-gray-400 mb-3">Mahallede top oynayan yetenekli gençleri keşfet. Şansına göre dünya yıldızı bile çıkabilir! (Maliyet: 2500₺)</p>
        <button onclick="tesisIslem('altyapi')" class="btn-action w-full" style="background:var(--neon-purple); color:#fff;">Sokaklarda Yetenek Ara (2500₺)</button>
      </div>
    </div>
  `;
}

function tesisIslem(tip) {
  if (tip === 'antrenman') {
    if(state.butce < 1500) return toast("Yetersiz bütçe!");
    state.butce -= 1500;
    state.kadro.forEach(p => { if(Math.random()>0.3) p.guc = Math.min(99, p.guc + rnd(1,3)); });
    toast("Takım antrenmanı tamamlandı! Güçler arttı.");
  } 
  else if (tip === 'tedavi') {
    if(state.butce < 800) return toast("Yetersiz bütçe!");
    state.butce -= 800;
    state.kadro.forEach(p => { p.kondisyon = 100; p.sakat = false; });
    toast("Tüm takımın kondisyonu yenilendi, sakatlar iyileşti.");
  }
  else if (tip === 'altyapi') {
    if(state.butce < 2500) return toast("Yetersiz bütçe!");
    state.butce -= 2500;
    
    // Özel Bedo Easter Egg: İlk altyapı her zaman Ömer Faruk Muş
    let yeniYetenek;
    if (!state.altyapiKesfi) {
      yeniYetenek = oyuncuUret("ORT", 70, 85, "Ömer Faruk Muş");
      yeniYetenek.yas = 17;
      state.altyapiKesfi = true;
      toast("⭐ İNANILMAZ! Mahalle parkında 'Ömer Faruk Muş' adında müthiş bir yetenek bulduk!");
    } else {
      yeniYetenek = oyuncuUret(null, 45, 75);
      yeniYetenek.yas = rnd(15, 18);
      toast(`Genç yetenek ${yeniYetenek.ad} takıma katıldı.`);
    }
    state.kadro.push(yeniYetenek);
  }
  renderEkran();
}

/* ---------- 4. MARKET & SPONSOR ---------- */
function scrMarket() {
  const spHTML = SPONSORLAR.map(s => `
    <div class="border border-gray-800 rounded p-3 mb-2 ${state.aktifSponsor?.id === s.id ? 'bg-gray-900 border-green-500' : ''}">
      <div class="flex justify-between">
        <span class="font-bold text-sm text-white">${s.ad}</span>
        ${state.aktifSponsor?.id === s.id 
          ? `<span class="text-xs accent-text font-bold">Aktif</span>` 
          : `<button onclick="sponsorSec('${s.id}')" class="text-xs text-green-400 bg-green-900 bg-opacity-20 px-2 py-1 rounded">Anlaş</button>`}
      </div>
      <p class="text-[10px] text-gray-500 mt-1">${s.aciklama}</p>
      <div class="flex gap-3 mt-2 text-xs">
        <span class="text-gray-400">Peşinat: <b class="text-white">${s.pesinat}₺</b></span>
        <span class="text-gray-400">Haftalık: <b class="text-white">${s.haftalik}₺</b></span>
      </div>
    </div>
  `).join("");

  const trHTML = state.transferListesi.map(p => `
    <div class="flex justify-between items-center border-b border-gray-800 py-2">
      <div>
        <p class="text-sm font-bold text-white">${p.ad} <span class="text-xs text-gray-500">(${p.pozisyon})</span></p>
        <p class="text-xs text-gray-400">Güç: ${p.guc} | Yaş: ${p.yas}</p>
      </div>
      <div class="text-right">
        <p class="text-sm font-bold text-blue-400 mb-1">${p.deger}₺</p>
        <button onclick="transferAl('${p.id}')" class="btn-action">Satın Al</button>
      </div>
    </div>
  `).join("");

  return `
    <div class="fade-in space-y-4">
      <h2 class="text-xl font-bold uppercase tracking-wider text-white">Finans & Transfer</h2>
      
      <div class="card">
        <h3 class="font-bold text-white mb-2 text-sm uppercase tracking-widest" style="color:var(--neon-purple)">Sponsorluk Anlaşmaları</h3>
        ${spHTML}
      </div>

      <div class="card">
        <h3 class="font-bold text-white mb-2 text-sm uppercase tracking-widest accent-text">Transfer Pazarı</h3>
        ${trHTML}
      </div>
    </div>
  `;
}

function sponsorSec(id) {
  if(state.aktifSponsor) return toast("Zaten bir sponsorun var! Sezon sonu değişir.");
  const s = SPONSORLAR.find(x => x.id === id);
  state.aktifSponsor = s;
  state.butce += s.pesinat;
  toast(`${s.ad} ile anlaşıldı! Peşinat kasaya eklendi.`);
  renderEkran();
}

function transferAl(id) {
  const p = state.transferListesi.find(x => x.id === id);
  if(state.butce < p.deger) return toast("Bütçe yetersiz!");
  state.butce -= p.deger;
  state.transferListesi = state.transferListesi.filter(x => x.id !== id);
  state.kadro.push(p);
  toast(`${p.ad} takıma katıldı!`);
  renderEkran();
}

/* ---------- 5. LİG & PUAN DURUMU ---------- */
function scrLeague() {
  const siralama = [...state.ligTakimlari].sort((a,b) => b.puan - a.puan || (b.at-b.ye) - (a.at-a.ye));
  const tabloHTML = siralama.map((t, i) => `
    <tr class="border-b border-gray-800 ${t.isUser ? 'bg-gray-900' : ''}">
      <td class="py-2 text-xs text-gray-500">${i+1}</td>
      <td class="py-2 text-sm font-bold ${t.isUser ? 'accent-text' : 'text-gray-300'}">${t.isim}</td>
      <td class="py-2 text-xs text-center text-gray-400">${t.oynanan}</td>
      <td class="py-2 text-xs text-center text-white font-bold">${t.puan}</td>
    </tr>
  `).join("");

  const aktifHafta = state.fikstur[state.hafta - 1];
  const fikHTML = aktifHafta ? aktifHafta.maclar.map(m => {
    let evT = state.ligTakimlari.find(t=>t.id===m.ev);
    let depT = state.ligTakimlari.find(t=>t.id===m.dep);
    return `
      <div class="flex justify-between text-xs py-1 border-b border-gray-800 last:border-0">
        <span class="${evT.isUser?'accent-text font-bold':'text-gray-400'} flex-1 text-right">${evT.isim}</span>
        <span class="px-3 text-white font-bold">${m.oynandi ? `${m.evSkor} - ${m.depSkor}` : 'v'}</span>
        <span class="${depT.isUser?'accent-text font-bold':'text-gray-400'} flex-1">${depT.isim}</span>
      </div>
    `;
  }).join("") : '<p class="text-xs text-gray-500">Sezon tamamlandı.</p>';

  return `
    <div class="fade-in space-y-4">
      <h2 class="text-xl font-bold uppercase tracking-wider text-white">Siber Mahalle Ligi</h2>
      
      <div class="card p-0 overflow-hidden">
        <div class="bg-gray-900 p-2 text-center text-xs text-gray-400 font-bold uppercase">Puan Durumu</div>
        <table class="w-full text-left px-2">
          <thead>
            <tr class="border-b border-gray-700 text-[10px] text-gray-500">
              <th class="py-1 px-1 w-6">#</th><th>Takım</th><th class="text-center w-8">O</th><th class="text-center w-8">P</th>
            </tr>
          </thead>
          <tbody>${tabloHTML}</tbody>
        </table>
      </div>

      <div class="card">
        <h3 class="font-bold text-white mb-2 text-sm uppercase tracking-widest text-center">Hafta ${state.hafta} Fikstürü</h3>
        ${fikHTML}
      </div>
    </div>
  `;
}

/* ---------- MAÇ MOTORU ---------- */
function macBaslat() {
  const aktifHafta = state.fikstur[state.hafta - 1];
  if(!aktifHafta) return;

  const benimMac = aktifHafta.maclar.find(m => m.ev === 'benimTakim' || m.dep === 'benimTakim');
  const digerMaclar = aktifHafta.maclar.filter(m => m !== benimMac);

  // Diğer maçları hızlıca simüle et
  digerMaclar.forEach(m => {
    let gucEv = takimGucu(m.ev); let gucDep = takimGucu(m.dep);
    m.evSkor = rngGol(gucEv, gucDep, true);
    m.depSkor = rngGol(gucDep, gucEv, false);
    m.oynandi = true;
    macSonucIsle(m);
  });

  // Kullanıcı Maçı Simülasyonu
  macSim = {
    calisiyor: true, dakika: 0, loglar: [],
    ev: state.ligTakimlari.find(t=>t.id===benimMac.ev),
    dep: state.ligTakimlari.find(t=>t.id===benimMac.dep),
    evSkor: 0, depSkor: 0,
    gucEv: takimGucu(benimMac.ev),
    gucDep: takimGucu(benimMac.dep),
    macRef: benimMac
  };

  renderMac();
  macSim.zamanlayici = setInterval(ilerletMac, 400);
}

function rngGol(saldiran, savunan, evSahibi) {
  let fark = saldiran - savunan;
  if(evSahibi) fark += 5; // Ev sahibi avantajı
  let sans = 0.15 + (fark * 0.01);
  let gol = 0;
  for(let i=0; i<5; i++) { if(Math.random() < sans) gol++; }
  return gol;
}

function renderMac() {
  const html = `
    <div class="modal-overlay fade-in p-4" id="match-ui">
      <div class="card mt-10 text-center relative" style="border-color:var(--neon-purple)">
        <div class="text-xs text-gray-400 mb-2 pulse" id="m-dakika">⏱ 0'</div>
        <div class="flex justify-between items-center text-xl font-bold text-white mb-4">
          <div class="flex-1 text-right pr-4 ${macSim.ev.isUser?'accent-text':''}">${macSim.ev.isim}</div>
          <div class="bg-gray-900 px-4 py-2 rounded border border-gray-700" id="m-skor">0 - 0</div>
          <div class="flex-1 text-left pl-4 ${macSim.dep.isUser?'accent-text':''}">${macSim.dep.isim}</div>
        </div>
        <div id="m-loglar" class="h-48 overflow-y-auto text-left space-y-2 bg-black bg-opacity-50 p-2 rounded text-xs"></div>
        <button id="m-kapat" class="btn-primary mt-4 hidden" onclick="macBitir()">Devam Et</button>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = html;
}

function mLog(msg, color="text-gray-400") {
  const div = document.getElementById("m-loglar");
  if(!div) return;
  div.innerHTML += `<div class="log-entry ${color}">${msg}</div>`;
  div.scrollTop = div.scrollHeight;
}

function ilerletMac() {
  macSim.dakika += 9;
  document.getElementById("m-dakika").innerText = `⏱ ${macSim.dakika}'`;

  // Anlık olay hesapla
  let evSansi = 0.08 + ((macSim.gucEv - macSim.gucDep)*0.002);
  let depSansi = 0.06 + ((macSim.gucDep - macSim.gucEv)*0.002);

  if (Math.random() < evSansi) {
    macSim.evSkor++;
    mLog(`⚽ ${macSim.ev.isim} golü buldu!`, macSim.ev.isUser ? "accent-text font-bold" : "text-red-400 font-bold");
  } else if (Math.random() < depSansi) {
    macSim.depSkor++;
    mLog(`⚽ ${macSim.dep.isim} topu ağlara gönderdi.`, macSim.dep.isUser ? "accent-text font-bold" : "text-red-400 font-bold");
  } else {
    const txt = ["Orta saha mücadelesi.","Tehlikeli atak, kaleci kurtardı.","Sert bir faul, hakem uyardı.","Taç atışıyla oyun sürüyor."];
    mLog(`⏱ ${macSim.dakika}' ${txt[rnd(0,3)]}`);
  }

  document.getElementById("m-skor").innerText = `${macSim.evSkor} - ${macSim.depSkor}`;

  if (macSim.dakika >= 90) {
    clearInterval(macSim.zamanlayici);
    document.getElementById("m-dakika").innerText = "Maç Bitti";
    document.getElementById("m-kapat").classList.remove("hidden");
    mLog("Hakem maçı bitiren düdüğü çaldı! 🏁", "text-white font-bold");
    
    // Yorgunluk
    state.kadro.forEach(p => { p.kondisyon = Math.max(30, p.kondisyon - rnd(10, 20)); });
  }
}

function macSonucIsle(m) {
  let tEv = state.ligTakimlari.find(x=>x.id===m.ev);
  let tDep = state.ligTakimlari.find(x=>x.id===m.dep);
  tEv.oynanan++; tDep.oynanan++;
  tEv.at += m.evSkor; tEv.ye += m.depSkor;
  tDep.at += m.depSkor; tDep.ye += m.evSkor;
  
  if(m.evSkor > m.depSkor) { tEv.gal++; tEv.puan+=3; tDep.mag++; }
  else if(m.depSkor > m.evSkor) { tDep.gal++; tDep.puan+=3; tEv.mag++; }
  else { tEv.ber++; tDep.ber++; tEv.puan+=1; tDep.puan+=1; }
}

function macBitir() {
  macSim.macRef.evSkor = macSim.evSkor;
  macSim.macRef.depSkor = macSim.depSkor;
  macSim.macRef.oynandi = true;
  macSonucIsle(macSim.macRef);
  
  // Ekonomi
  const maasGideri = state.kadro.reduce((a,b)=>a+b.maas, 0);
  const spGeliri = state.aktifSponsor ? state.aktifSponsor.haftalik : 0;
  const biletGeliri = Math.floor(state.taraftarSayisi * (state.biletFiyati / 50) * rnd(80,100)/100);
  state.butce += (spGeliri + biletGeliri) - maasGideri;

  // Taraftar Değişimi
  let benimPuan = macSim.ev.isUser ? (macSim.evSkor>macSim.depSkor?3:macSim.evSkor===macSim.depSkor?1:0) : (macSim.depSkor>macSim.evSkor?3:macSim.evSkor===macSim.depSkor?1:0);
  if(benimPuan===3) state.taraftarSayisi += rnd(20, 50);
  else if(benimPuan===0) state.taraftarSayisi -= rnd(10, 30);

  state.hafta++;
  marketYenile();
  
  document.getElementById("match-ui").remove();
  toast(`Bilet: +${biletGeliri}₺ | Sponsor: +${spGeliri}₺ | Maaş: -${maasGideri}₺`);
  renderEkran();
}

/* ---------- START ---------- */
window.onload = () => { oyunuKur(); };
</script>
