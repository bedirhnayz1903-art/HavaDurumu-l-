<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mahalle Ligi: Neon Menajer PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body {
    background: #030305; color: #e5e7eb; font-family: 'Rajdhani', sans-serif;
    overscroll-behavior: none; user-select: none; margin: 0; padding: 0;
  }
  :root {
    --neon-green: #39ff88; --neon-purple: #b026ff; --neon-cyan: #00f3ff;
    --neon-gold: #ffd700; --dark-bg: #090a0f; --card-bg: #11131a; --border-color: #1f222e;
  }
  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; background: radial-gradient(circle at top, #0d1527 0%, #030305 100%); border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
  .screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px 95px 16px; }
  .screen::-webkit-scrollbar { display: none; }
  .bottom-nav { display: flex; background: rgba(5, 6, 10, 0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border-color); position: absolute; bottom: 0; left: 0; right: 0; z-index: 40; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 2px; gap: 4px; color: #4b5563; font-size: 10px; font-weight: 600; transition: all .3s; text-transform: uppercase; letter-spacing: 1px; }
  .nav-btn.active { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,243,255,0.4); }
  .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; margin-bottom: 12px; position: relative; overflow: hidden; transition: all 0.3s; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--border-color); transition: .3s; }
  .card:hover::before { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
  .accent-green { color: var(--neon-green); text-shadow: 0 0 5px rgba(57,255,136,0.2); }
  .accent-cyan { color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0,243,255,0.2); }
  .btn-primary { background: transparent; color: var(--neon-cyan); font-weight: 700; border: 1px solid var(--neon-cyan); border-radius: 10px; padding: 12px 16px; text-align: center; text-transform: uppercase; letter-spacing: 1px; box-shadow: inset 0 0 10px rgba(0,243,255,0.05), 0 0 10px rgba(0,243,255,0.05); transition: all .2s; cursor: pointer; width: 100%; }
  .btn-primary:active { transform: scale(0.97); background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }
  .btn-action { background: #161b26; color: #fff; border: 1px solid #2d3748; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: .2s; }
  .btn-action:active { transform: scale(0.95); border-color: var(--neon-purple); color: var(--neon-purple); }
  .stat-bar-track { background: #141923; border-radius: 6px; height: 8px; width: 100%; overflow: hidden; border: 1px solid #222936; }
  .stat-bar-fill { height: 100%; transition: width 0.4s ease; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(3,3,5,0.98); z-index: 50; display: flex; flex-direction: column; overflow-y: auto; }
  .toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #090a0f; border: 1px solid var(--neon-purple); color: var(--neon-purple); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; z-index: 60; box-shadow: 0 0 15px rgba(176,38,255,0.3); letter-spacing: 1px; text-align: center; max-width: 90%; }
  .fade-in { animation: fadeIn .3s ease-out forwards; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .pulse { animation: pulseAnim 1.5s infinite; }
  @keyframes pulseAnim { 0%,100%{opacity:1;} 50%{opacity:.4;} }
  .pitch { background: #071c10; border: 2px solid #143d22; position: relative; border-radius: 8px; height: 60px; overflow: hidden; }
  .pitch-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #143d22; }
  .pitch-ball { position: absolute; top: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); transition: left 0.4s ease, box-shadow 0.3s; box-shadow: 0 0 8px #fff; }
</style>
</head>
<body>

<div id="app">
  <div id="screen-container" class="screen"></div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <nav class="bottom-nav" id="main-nav" style="display:none;">
    <div class="nav-btn" data-tab="home" onclick="switchTab('home')"><span class="text-lg">🏟️</span><span>Kulüp</span></div>
    <div class="nav-btn" data-tab="squad" onclick="switchTab('squad')"><span class="text-lg">⚡</span><span>Kadro</span></div>
    <div class="nav-btn" data-tab="facilities" onclick="switchTab('facilities')"><span class="text-lg">🏗️</span><span>Gelişim</span></div>
    <div class="nav-btn" data-tab="market" onclick="switchTab('market')"><span class="text-lg">🤝</span><span>Pazar</span></div>
    <div class="nav-btn" data-tab="league" onclick="switchTab('league')"><span class="text-lg">🏆</span><span>Lig</span></div>
  </nav>
</div>

<script>
const POZISYONLAR = ["KL", "DEF", "ORT", "FOR"];
const LOGOLAR = [
  { icon: "🐉", renk: "#ff3333", ad: "Ejderhalar" }, { icon: "🦅", renk: "#00f3ff", ad: "Kartallar" },
  { icon: "🐺", renk: "#b026ff", ad: "Kurtlar" }, { icon: "🦁", renk: "#ffd700", ad: "Aslanlar" },
  { icon: "🐍", renk: "#39ff88", ad: "Yılanlar" }, { icon: "💀", renk: "#ffffff", ad: "Kuru Kafalar" },
  { icon: "🐆", renk: "#ff007f", ad: "Panterler" }, { icon: "🦂", renk: "#ffaa00", ad: "Akrepler" },
  { icon: "🦈", renk: "#0055ff", ad: "Köpekbalıkları" }, { icon: "🦊", renk: "#ff5500", ad: "Tilkiler" }
];

const SPONSORLAR = [
  { id: 's1', ad: 'Köz Çay Ocağı & Cyber', pesinat: 3000, haftalik: 500, aciklama: 'Mahallenin kalbi burada atar. Güvenilir esnaf desteği.' },
  { id: 's2', ad: 'Neon Corp Enerji', pesinat: 7000, haftalik: 250, aciklama: 'Kurumsal siber şirket. Peşinatı yüksek tutar.' },
  { id: 's3', ad: 'Sokak Kültürü Giyim', pesinat: 4500, haftalik: 400, aciklama: 'Gençlerin tarzı, dengeli bütçe akışı.' }
];

const LIG_KADEMELERI = ["Mahalle Amatör Ligi", "Bölgesel Siber Lig", "Neon Süper Lig"];

let state = {
  menajer: "", kulupAdi: "", logoIndex: 0,
  butce: 12000, hafta: 1, toplamHafta: 14,
  biletFiyati: 40, taraftarSayisi: 1200, taraftarMemnuniyet: 85,
  aktifSponsor: null, kadro: [], transferListesi: [], scoutHavuzu: [],
  ligKademesi: 0, ligTakimlari: [], fikstur: [], aktifTab: "home",
  taktik: "Dengeli", altyapiKesfi: false, ogreticiAdim: 0
};

let macSim = { calisiyor: false, dakika: 0, loglar: [], ev:null, rakip:null, zamanlayici: null, bekleyenMaclar: [], topPozisyonu: 50, durumYazisi: "Orta Saha Mücadelesi" };

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function isimUret() {
  const adlar = ["Mert","Kaan","Berat","Eren","Caner","Arda","Barış","Doğukan","Cem","Ufuk","Sinan","Volkan","Gökhan","Emre"];
  const soyadlar = ["Yılmaz","Demir","Kaya","Çelik","Şahin","Aslan","Polat","Özdemir","Avcı","Tekin","Kılıç","Yıldız"];
  return adlar[rnd(0, adlar.length-1)] + " " + soyadlar[rnd(0, soyadlar.length-1)];
}

function oyuncuUret(poz, minGuc, maxGuc, ozelAd = null) {
  const p = poz || POZISYONLAR[rnd(0,3)];
  const taban = rnd(minGuc, maxGuc);
  return {
    id: 'p_' + Math.random().toString(36).substr(2, 9),
    ad: ozelAd || isimUret(), pozisyon: p, guc: taban, kondisyon: rnd(85, 100),
    sakat: false, maas: Math.floor(taban * 1.8), deger: taban * rnd(120, 180), yas: rnd(16, 32)
  };
}

/* ---------- OYUN BAŞLANGICI VE KURULUM ---------- */
window.onload = () => { renderGirisEkrani(); };

function renderGirisEkrani() {
  let logoHTML = LOGOLAR.map((l, idx) => `
    <button onclick="secLogo(${idx})" id="logo-btn-${idx}" class="p-3 border border-gray-800 rounded-xl bg-gray-900 text-2xl flex flex-col items-center gap-1 transition-all">
      <span>${l.icon}</span>
      <span class="text-[10px] text-gray-400" style="color:${l.renk}">${l.ad}</span>
    </button>
  `).join("");

  document.getElementById("screen-container").innerHTML = `
    <div class="fade-in space-y-6 pt-4 pb-20">
      <div class="text-center">
        <h1 class="text-3xl font-bold tracking-widest text-white">MAHALLE LİGİ</h1>
        <p class="text-xs tracking-widest text-cyan-400 font-bold">NEON MENAJER PRO v2.0</p>
      </div>

      <div class="card space-y-3" style="border-color: var(--neon-cyan)">
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-bold">Menajer Adı</label>
          <input type="text" id="input-manager" value="Bedo" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-white focus:border-cyan-400 outline-none font-bold">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1 font-bold">Kulüp Adı</label>
          <input type="text" id="input-club" value="Siyah Beyaz FK" class="w-full bg-black border border-gray-800 rounded-lg p-3 text-white focus:border-cyan-400 outline-none font-bold">
        </div>
      </div>

      <div>
        <label class="block text-xs uppercase tracking-wider text-gray-400 mb-2 font-bold text-center">Takım Simgesi & Renk Paleti</label>
        <div class="grid grid-cols-5 gap-2">${logoHTML}</div>
      </div>

      <button onclick="baslangicOnayla()" class="btn-primary w-full py-4 text-base">KULÜBÜ KUR & BAŞLA 🚀</button>
    </div>
  `;
  setTimeout(() => secLogo(0), 50);
}

function secLogo(idx) {
  state.logoIndex = idx;
  LOGOLAR.forEach((_, i) => {
    const el = document.getElementById(`logo-btn-${i}`);
    if(el) {
      if(i === idx) {
        el.style.borderColor = LOGOLAR[idx].renk;
        el.style.boxShadow = `0 0 12px ${LOGOLAR[idx].renk}40`;
        el.style.background = "#141722";
      } else {
        el.style.borderColor = "#1f222e";
        el.style.boxShadow = "none";
        el.style.background = "#11131a";
      }
    }
  });
}

function baslangicOnayla() {
  const mName = document.getElementById("input-manager").value.trim();
  const cName = document.getElementById("input-club").value.trim();
  if(!mName || !cName) { toast("Lütfen alanları boş bırakmayın!"); return; }
  
  state.menajer = mName;
  state.kulupAdi = cName;
  
  // Kadro İlk Kurulum
  state.kadro.push(oyuncuUret("KL", 62, 75));
  for(let i=0; i<4; i++) state.kadro.push(oyuncuUret("DEF", 58, 75));
  for(let i=0; i<4; i++) state.kadro.push(oyuncuUret("ORT", 58, 75));
  for(let i=0; i<3; i++) state.kadro.push(oyuncuUret("FOR", 60, 78));
  
  ligTakimlariniUret();
  document.getElementById("main-nav").style.display = "flex";
  
  // Doğrudan öğreticiyi başlat
  state.ogreticiAdim = 1;
  renderOgretici();
}

/* ---------- ÖĞRETİCİ (TUTORIAL) MODU ---------- */
function renderOgretici() {
  const adimlar = [
    "",
    { t: "Siber Sokaklara Hoş Geldin!", c: `Merhaba Menajer ${state.menajer}! ${state.kulupAdi} kulübünün kontrolü tamamen senin elinde. Neon ışıklı bu mahalle liginde zirveye oynamaya hazır mısın?` },
    { t: "Kadro & Dinamikler", c: "Kadro sekmesinden oyuncularının Güç ve Kondisyon durumlarını görebilirsin. Maç yaptıkça oyuncuların yorulur, sakatlanabilir. Unutma, kadroda en az 11 oyuncun olmalı!" },
    { t: "Gelişim ve Tesis Yapılanması", c: "Gelişim sekmesinden takımına antrenman yaptırabilir, doktor yardımıyla sakatları iyileştirebilir veya Mahalle Parkı'nda sokak yeteneklerini keşfe çıkabilirsin!" },
    { t: "Finansman & Sponsorlar", c: "Pazar sekmesinden takımına sponsor bulabilir ve transfer listesindeki yıldızları kadrona katabilirsin. Şimdi öğreticiyi tamamla ve ilk maçına hazırlan!" }
  ];

  if(state.ogreticiAdim >= adimlar.length) {
    document.getElementById("modal-container").innerHTML = "";
    oyunuBaslat();
    return;
  }

  const veri = adimlar[state.ogreticiAdim];
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay justify-center items-center p-6 bg-black bg-opacity-95">
      <div class="card max-w-sm w-full text-center border-cyan-400 border space-y-4 fade-in">
        <h3 class="text-xl font-bold text-cyan-400 uppercase tracking-widest">${veri.t}</h3>
        <p class="text-sm text-gray-300 leading-relaxed">${veri.c}</p>
        <button onclick="state.ogreticiAdim++; renderOgretici();" class="btn-primary py-2 text-sm">İLERLE ✨</button>
      </div>
    </div>
  `;
}

function oyunuBaslat() {
  fiksturOlustur();
  marketYenile();
  scoutHavuzuYenile();
  switchTab("home");
}

function ligTakimlariniUret() {
  state.ligTakimlari = [];
  // Kullanıcı takımı
  state.ligTakimlari.push({
    id: 'benimTakim', isim: state.kulupAdi, isUser: true,
    logo: LOGOLAR[state.logoIndex].icon, renk: LOGOLAR[state.logoIndex].renk,
    guc: 0, oynanan:0, gal:0, ber:0, mag:0, at:0, ye:0, puan:0
  });

  // Rakip isim havuzları (Kademelere göre güç katsayıları değişir)
  const rakipler = ["Kızıltepe İdman", "Cyber Şehir", "Karakartal Gençlik", "Gölge United", "Demir Kanatlar", "Zehir SK", "Kozmos Gücü", "Varoş Yıldızları"];
  const carpan = state.ligKademesi * 10; // Her üst lig +10 güç tabanı getirir

  rakipler.forEach((isim, i) => {
    state.ligTakimlari.push({
      id: 't_' + i, isim: isim, isUser: false,
      logo: LOGOLAR[(i + state.logoIndex + 1) % LOGOLAR.length].icon,
      renk: LOGOLAR[(i + state.logoIndex + 1) % LOGOLAR.length].renk,
      guc: rnd(55 + carpan, 75 + carpan),
      oynanan:0, gal:0, ber:0, mag:0, at:0, ye:0, puan:0
    });
  });
}

function fiksturOlustur() {
  state.fikstur = [];
  let takimlar = state.ligTakimlari.map(t => t.id);
  const toplamHafta = (takimlar.length - 1) * 2;
  state.toplamHafta = toplamHafta;
  
  for (let hafta = 1; hafta <= toplamHafta; hafta++) {
    let haftaMaclari = [];
    let tur = (hafta > takimlar.length - 1) ? hafta - (takimlar.length - 1) : hafta;
    
    let temp = [...takimlar];
    let sabit = temp.shift();
    for(let i=0; i<tur-1; i++) temp.unshift(temp.pop());
    let eslesme = [sabit, ...temp];
    
    for(let i=0; i<eslesme.length/2; i++) {
      let ev = eslesme[i];
      let dep = eslesme[eslesme.length - 1 - i];
      if (hafta > takimlar.length - 1) { let t=ev; ev=dep; dep=t; }
      haftaMaclari.push({ ev, dep, oynandi: false, evSkor: 0, depSkor: 0 });
    }
    state.fikstur.push({ hafta, maclar: haftaMaclari });
  }
}

function marketYenile() {
  state.transferListesi = [];
  const taban = state.ligKademesi * 10;
  for(let i=0; i<4; i++) state.transferListesi.push(oyuncuUret(null, 52 + taban, 82 + taban));
}

function scoutHavuzuYenile() {
  state.scoutHavuzu = [];
  const taban = state.ligKademesi * 10;
  for(let i=0; i<3; i++) state.scoutHavuzu.push(oyuncuUret(null, 45 + taban, 88 + taban));
}

function takimGucu(id) {
  if (id === 'benimTakim') {
    let top = 0; let s = 0;
    state.kadro.forEach(p => {
      if(!p.sakat) { top += p.guc * (p.kondisyon/100); s++; }
    });
    let anaGuc = s > 0 ? Math.floor(top/s) : 30;
    // Taktiksel bonuslar
    if(state.taktik === "Hücum") anaGuc += 2;
    if(state.taktik === "Savunma") anaGuc -= 1;
    return anaGuc;
  }
  return state.ligTakimlari.find(t=>t.id===id).guc;
}

/* ---------- EKRAN YÖNLENDİRME ---------- */
function switchTab(tab) {
  if(macSim.calisiyor) return;
  state.aktifTab = tab;
  renderEkran();
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.aktifTab);
  });
}

function renderEkran() {
  const container = document.getElementById("screen-container");
  if(state.aktifTab==='home') container.innerHTML = scrHome();
  else if(state.aktifTab==='squad') container.innerHTML = scrSquad();
  else if(state.aktifTab==='facilities') container.innerHTML = scrFacilities();
  else if(state.aktifTab==='market') container.innerHTML = scrMarket();
  else if(state.aktifTab==='league') container.innerHTML = scrLeague();
}

function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast fade-in'; t.innerHTML = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

/* ---------- 1. KULÜP ANA EKRANI ---------- */
function scrHome() {
  const guc = takimGucu('benimTakim');
  const haftalikGider = state.kadro.reduce((a,b)=>a+b.maas, 0);
  const siradakiHafta = state.fikstur.find(f => f.maclar.some(m => !m.oynandi));
  let macKarti = `<div class="text-center p-2 text-yellow-400 font-bold">Sezon Tamamlandı! Lig sekmesinden durumunu kontrol et.</div>`;
  
  if (siradakiHafta) {
    const benimMac = siradakiHafta.maclar.find(m => m.ev === 'benimTakim' || m.dep === 'benimTakim');
    const rakipId = benimMac.ev === 'benimTakim' ? benimMac.dep : benimMac.ev;
    const rakip = state.ligTakimlari.find(t => t.id === rakipId);
    macKarti = `
      <div class="flex justify-between items-center mb-4 bg-black bg-opacity-40 p-3 rounded-xl border border-gray-900">
        <div class="text-center flex-1">
          <span class="text-xl block">${benimMac.ev==='benimTakim'?LOGOLAR[state.logoIndex].icon:rakip.logo}</span>
          <span class="block font-bold text-sm ${benimMac.ev==='benimTakim'?'accent-cyan':'text-white'}">${benimMac.ev==='benimTakim' ? state.kulupAdi : rakip.isim}</span>
        </div>
        <div class="font-bold text-base text-gray-600 px-2">VS</div>
        <div class="text-center flex-1">
          <span class="text-xl block">${benimMac.dep==='benimTakim'?LOGOLAR[state.logoIndex].icon:rakip.logo}</span>
          <span class="block font-bold text-sm ${benimMac.dep==='benimTakim'?'accent-cyan':'text-white'}">${benimMac.dep==='benimTakim' ? state.kulupAdi : rakip.isim}</span>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 mb-3">
        <button onclick="setTaktik('Dengeli')" class="text-xs p-2 rounded border ${state.taktik==='Dengeli'?'border-cyan-400 text-cyan-400 bg-cyan-950 bg-opacity-20':'border-gray-800'} font-bold">Dengeli</button>
        <button onclick="setTaktik('Hücum')" class="text-xs p-2 rounded border ${state.taktik==='Hücum'?'border-green-400 text-green-400 bg-green-950 bg-opacity-20':'border-gray-800'} font-bold">Hücum</button>
        <button onclick="setTaktik('Savunma')" class="text-xs p-2 rounded border ${state.taktik==='Savunma'?'border-red-400 text-red-400 bg-red-950 bg-opacity-20':'border-gray-800'} font-bold">Savunma</button>
      </div>
      <button onclick="macBaslat()" class="btn-primary w-full py-3 text-sm">MAÇI BAŞLAT ⚽</button>
    `;
  }

  return `
    <div class="fade-in space-y-4">
      <div class="flex justify-between items-start">
        <div>
          <div class="flex items-center gap-2">
            <span class="text-2xl">${LOGOLAR[state.logoIndex].icon}</span>
            <h1 class="text-2xl font-bold text-white tracking-wide">${state.kulupAdi}</h1>
          </div>
          <p class="text-xs text-gray-400 mt-0.5">Menajer: <span class="accent-cyan font-bold">${state.menajer}</span> | <span class="text-yellow-400 font-bold">${LIG_KADEMELERI[state.ligKademesi]}</span></p>
        </div>
        <div class="text-right">
          <span class="text-[10px] uppercase tracking-wider text-gray-500 font-bold block">Kasa</span>
          <span class="text-lg font-bold text-emerald-400">${state.butce.toLocaleString('tr-TR')} ₺</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="card mb-0 p-3">
          <span class="text-[10px] text-gray-500 uppercase block font-bold">Hafta Değerlendirmesi</span>

  if (tip === 'antrenman') {

    state.kadro.forEach(p => { if(Math.random()>0.25) p.guc = Math.min(99, p.guc + rnd(1,3)); });

  } 
  else if (tip === 'tedavi') {
    if(state.butce < 1200) return toast("❌ Yetersiz Bütçe!");
    state.butce -= 1200;
    state.kadro.forEach(p => { p.kondisyon = 100; p.sakat = false; });
    toast("🏥 Sağlık heyeti raporu: Tüm takım tamamen iyileşti ve zinde!");

  else if (tip === 'altyapi') {
    if(state.butce < 3000) return toast("❌ Yetersiz Bütçe!");
    if(state.kadro.length >= 18) return toast("❌ Kadronuz tamamen dolu (Maks 18).");

      toast(`✨ Altyapıdan genç filiz <b>${yeniYetenek.ad}</b> (${yeniYetenek.pozisyon}) kadroya dahil edildi.`);

/* ---------- GELİŞMİŞ CANLI MAÇ MOTORU & ANİMATÖR ---------- */
function macBaslat() {
  const aktifHafta = state.fikstur[state.hafta - 1];
  if(!aktifHafta) return;

  const benimMac = aktifHafta.maclar.find(m => m.ev === 'benimTakim' || m.dep === 'benimTakim');
  const digerMaclar = aktifHafta.maclar.filter(m => m !== benimMac);

  digerMaclar.forEach(m => {
    let gucEv = takimGucu(m.ev); let gucDep = takimGucu(m.dep);
    m.evSkor = rngGol(gucEv, gucDep, true);
    m.depSkor = rngGol(gucDep, gucEv, false);
    m.oynandi = true;
    macSonucIsle(m);
  });

  macSim = {
    calisiyor: true, dakika: 0, loglar: [],
    ev: state.ligTakimlari.find(t=>t.id===benimMac.ev),
    dep: state.ligTakimlari.find(t=>t.id===benimMac.dep),
    evSkor: 0, depSkor: 0,
    gucEv: takimGucu(benimMac.ev), gucDep: takimGucu(benimMac.dep),
    macRef: benimMac, topPozisyonu: 50, durumYazisi: "Karşılaşma Başlıyor..."
  };

  renderMacEkrani();
  macSim.zamanlayici = setInterval(ilerletMac, 450);
}

function rngGol(saldiran, savunan, evSahibi) {
  let fark = saldiran - savunan;
  if(evSahibi) fark += 4;
  let sans = 0.12 + (fark * 0.002);
  let gol = 0;
  for(let i=0; i<4; i++) { if(Math.random() < sans) gol++; }
  return gol;
}

function renderMacEkrani() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay p-4 justify-between" id="match-ui">
      <div class="card text-center relative border-purple-500 border mt-4">
        <span class="text-xs bg-purple-950 text-purple-300 px-3 py-1 border border-purple-800 rounded-full pulse font-bold" id="m-dakika">⏱ 0'</span>
        
        <div class="flex justify-between items-center text-lg font-bold text-white my-4">
          <div class="flex-1 text-right pr-2 ${macSim.ev.isUser?'text-cyan-400':''}">${macSim.ev.logo} ${macSim.ev.isim}</div>
          <div class="bg-black px-4 py-1.5 border border-gray-800 rounded-lg text-xl font-mono text-green-400" id="m-skor">0 - 0</div>
          <div class="flex-1 text-left pl-2 ${macSim.dep.isUser?'text-cyan-400':''}">${macSim.dep.isim} ${macSim.dep.logo}</div>
        </div>

        <!-- Canlı Neon Saha Animatörü -->
        <div class="pitch mb-3">
          <div class="pitch-line"></div>
          <div class="pitch-ball" id="m-ball" style="left: 50%;"></div>
        </div>
        <div class="text-xs text-yellow-400 font-bold bg-black bg-opacity-40 p-1.5 rounded border border-gray-900" id="m-status">${macSim.durumYazisi}</div>
      </div>

      <div id="m-loglar" class="flex-1 my-3 overflow-y-auto text-left space-y-1 bg-black bg-opacity-70 p-3 rounded-xl text-xs font-mono border border-gray-900"></div>

      <div class="card p-3 mb-2">
        <p class="text-[10px] text-gray-500 uppercase font-bold mb-2 text-center">Anlık Taktik Müdahale</p>
        <div class="grid grid-cols-3 gap-2">
          <button onclick="macIciTaktik('Hücum')" class="bg-green-950 text-green-400 border border-green-900 font-bold p-2 rounded text-xs">Tam Hücum</button>
          <button onclick="macIciTaktik('Dengeli')" class="bg-gray-900 text-white border border-gray-800 font-bold p-2 rounded text-xs">Dengeli</button>
          <button onclick="macIciTaktik('Savunma')" class="bg-red-950 text-red-400 border border-red-900 font-bold p-2 rounded text-xs">Otobüsü Çek</button>
        </div>
      </div>

      <button id="m-kapat" class="btn-primary py-3 text-sm hidden" onclick="macBitir()">Soyunma Odasına Dön 🏟️</button>
    </div>
  `;
}

function macIciTaktik(t) {
  state.taktik = t;
  macSim.gucEv = takimGucu(macSim.ev.id);
  macSim.gucDep = takimGucu(macSim.dep.id);
  const logDiv = document.getElementById("m-loglar");
  if(logDiv) logDiv.innerHTML += `<div class="text-yellow-400 text-center font-bold text-[11px]">⚠️ Taktik Değişikliği: Takım artık "${t}" oynuyor.</div>`;
}

function ilerletMac() {
  macSim.dakika += rnd(3, 5);
  if(macSim.dakika > 90) macSim.dakika = 90;
  
  document.getElementById("m-dakika").innerText = `⏱ ${macSim.dakika}'`;

  let fark = macSim.gucEv - macSim.gucDep;
  let evSansi = 0.08 + (fark * 0.003);
  let depSansi = 0.07 - (fark * 0.003);

  const z = Math.random();
  const ballEl = document.getElementById("m-ball");
  const statusEl = document.getElementById("m-status");
  const logDiv = document.getElementById("m-loglar");

  if (z < evSansi) {
    // Ev Sahibi Atakta
    macSim.topPozisyonu = rnd(70, 90);
    if(ballEl) ballEl.style.left = macSim.topPozisyonu + "%";
    
    if(Math.random() < 0.28) {
      macSim.evSkor++;
      macSim.topPozisyonu = 95;
      if(ballEl) ballEl.style.left = "95%";
      logDiv.innerHTML += `<div class="text-green-400 font-bold">⚽ GOL! ${macSim.ev.isim} organize gelişen atakta golü buldu! (${macSim.dakika}')</div>`;
    } else {
      statusEl.innerText = `🔥 ${macSim.ev.isim} tehlikeli geliyor!`;
      logDiv.innerHTML += `<div class="text-gray-400">⏱️ ${macSim.dakika}' ${macSim.ev.isim} uzaktan şansını denedi, top az farkla dışarıda.</div>`;
    }
  } else if (z < evSansi + depSansi) {
    // Deplasman Atakta
    macSim.topPozisyonu = rnd(10, 30);
    if(ballEl) ballEl.style.left = macSim.topPozisyonu + "%";

    if(Math.random() < 0.28) {
      macSim.depSkor++;
      macSim.topPozisyonu = 5;
      if(ballEl) ballEl.style.left = "5%";
      logDiv.innerHTML += `<div class="text-red-400 font-bold">⚽ GOL! ${macSim.dep.isim} kontra ataktan fileleri havalandırdı! (${macSim.dakika}')</div>`;
    } else {
      statusEl.innerText = `🔥 ${macSim.dep.isim} yükleniyor!`;
      logDiv.innerHTML += `<div class="text-gray-400">⏱️ ${macSim.dakika}' ${macSim.dep.isim} ceza sahasına ortaladı, savunma topu uzaklaştırdı.</div>`;
    }
  } else {
    // Orta saha mücadelesi
    macSim.topPozisyonu = rnd(40, 60);
    if(ballEl) ballEl.style.left = macSim.topPozisyonu + "%";
    statusEl.innerText = "Sert ikili mücadeleler devam ediyor...";
  }

  document.getElementById("m-skor").innerText = `${macSim.evSkor} - ${macSim.depSkor}`;
  if(logDiv) logDiv.scrollTop = logDiv.scrollHeight;

  if (macSim.dakika >= 90) {
    clearInterval(macSim.zamanlayici);
    document.getElementById("m-dakika").innerText = "90' Maç Bitti";
    document.getElementById("m-dakika").classList.remove("pulse");
    document.getElementById("m-kapat").classList.remove("hidden");
    statusEl.innerText = "Müsabaka sona erdi.";
    if(logDiv) logDiv.innerHTML += `<div class="text-white text-center font-bold border-t border-gray-800 pt-1">🏁 Hakem son düdüğü çaldı!</div>`;
    
    // Oyuncu yorgunluk hesabı
    state.kadro.forEach(p => { p.kondisyon = Math.max(25, p.kondisyon - rnd(12, 22)); });
  }
}

function macSonucIsle(m) {
  let tEv = state.ligTakimlari.find(x=>x.id===m.ev);
  let tDep = state.ligTakimlari.find(x=>x.id===m.dep);
  tEv.oynanan++; tDep.oynanan++;
  tEv.at += m.evSkor; tEv.ye += m.depSkor;
  tDep.at += m.depSkor; tDep.ye += m.evSkor;
  
  if(m.evSkor > m.depSkor) { tEv.gal++; tEv.puan+=3; tDep.mag++; }
  else if(m.depSkor > m.evSkor) { tDep.gal++; tDep.puan+=3; tEv.mag++; }
  else { tEv.ber++; tDep.ber++; tEv.puan+=1; tDep.puan+=1; }
}

function macBitir() {
  macSim.macRef.evSkor = macSim.evSkor;
  macSim.macRef.depSkor = macSim.depSkor;
  macSim.macRef.oynandi = true;
  macSonucIsle(macSim.macRef);
  
  // Maç Sonu Gelir - Gider Hesabı
  const maasGideri = state.kadro.reduce((a,b)=>a+b.maas, 0);
  const spGeliri = state.aktifSponsor ? state.aktifSponsor.haftalik : 0;
  
  // Bilet geliri formülü (Fiyat arttıkça gelen taraftar oranı düşer)
  let dolulukOrani = Math.max(0.2, (100 - (state.biletFiyati * 0.8)) / 100) * (state.taraftarMemnuniyet / 100);
  const biletGeliri = Math.floor(state.taraftarSayisi * dolulukOrani * state.biletFiyati);
  
  state.butce += (spGeliri + biletGeliri) - maasGideri;

  // Taraftar Kazanımı / Kaybı
  let userMac = macSim.ev.isUser ? { skor: macSim.evSkor, rakipSkor: macSim.depSkor } : { skor: macSim.depSkor, rakipSkor: macSim.evSkor };
  if(userMac.skor > userMac.rakipSkor) {
    state.taraftarSayisi += rnd(40, 90);
    state.taraftarMemnuniyet = Math.min(100, state.taraftarMemnuniyet + 5);
  } else if(userMac.skor < userMac.rakipSkor) {
    state.taraftarSayisi = Math.max(200, state.taraftarSayisi - rnd(20, 50));
    state.taraftarMemnuniyet = Math.max(20, state.taraftarMemnuniyet - 8);
  }

  state.hafta++;
  macSim.calisiyor = false;
  document.getElementById("match-ui").remove();
  
  // Finans raporu göster
  toast(`<b>MÜSABAKA RAPORU:</b><br><span class="text-green-400">🎫 Bilet: +${biletGeliri}₺</span><br><span class="text-green-400">🤝 Sponsor: +${spGeliri}₺</span><br><span class="text-red-400">💸 Maaş: -${maasGideri}₺</span>`);
  
  // Etkinlik/Olay tetikleme kontrolü
  if(state.hafta <= state.toplamHafta && Math.random() > 0.5) {
    tetikleMahalleOlayi();
  } else {
    marketYenile();
    scoutHavuzuYenile();
    switchTab("home");
  }
}

/* ---------- RASTGELE ETKİNLİKLER (MAHALLE HİKAYELERİ) ---------- */
function tetikleMahalleOlayi() {
  const olaylar = [
    {
      t: "Mahalle Esnafından Ziyafet",
      c: "Esnaflar takıma moral yemeği vermek istiyor. Futbolcular çiğ köfte partisi yapacak. Kondisyon artar ama masraflara destek olunsun mu?",
      o1: "Katıl (500 ₺ Öde, +10 Kondisyon)",
      o2: "Reddet (Gerek yok)",
      f1: () => { state.butce -= 500; state.kadro.forEach(p=>p.kondisyon = Math.min(100, p.kondisyon+10)); },
      f2: () => {}
    },
    {
      t: "Yıldız Oyuncuya Gece Teklifi",
      c: "Siber kulüplerden biri oyuncularından birini kaçak halı saha maçına çağırmış. İzin verilsin mi?",
      o1: "Para Karşılığı Gönder (+1500 ₺, Bir oyuncu yorulur)",
      o2: "Asla İzin Verme",
      f1: () => { state.butce += 1500; if(state.kadro.length>0) state.kadro[rnd(0, state.kadro.length-1)].kondisyon -= 25; },
      f2: () => {}
    },
    {
      t: "Korsan Forma Satışı",
      c: "Mahalle pazarında kulübün korsan neon formaları satılıyor. Polis çağırılsın mı yoksa harçlık mı alınsın?",
      o1: "Göz Yum Rüşvet Al (+1000 ₺, Taraftar düşer)",
      o2: "Şikayet Et (+20 Taraftar)",
      f1: () => { state.butce += 1000; state.taraftarSayisi = Math.max(100, state.taraftarSayisi - 60); },
      f2: () => { state.taraftarSayisi += 20; }
    }
  ];

  const secilen = olaylar[rnd(0, olaylar.length - 1)];
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay justify-center items-center p-6 bg-black bg-opacity-95">
      <div class="card max-w-sm w-full border-purple-500 border space-y-4 text-center fade-in">
        <h3 class="text-base font-bold text-purple-400 uppercase tracking-widest">🚨 Beklenmedik Gelişme: ${secilen.t}</h3>
        <p class="text-xs text-gray-300 leading-relaxed">${secilen.c}</p>
        <div class="space-y-2 pt-2">
          <button onclick="olayKarar(1)" class="btn-action w-full text-xs">${secilen.o1}</button>
          <button onclick="olayKarar(2)" class="btn-action w-full text-xs border-gray-700">${secilen.o2}</button>
        </div>
      </div>
    </div>
  `;

  window.olayKarar = (secim) => {
    if(secim === 1) secilen.f1();
    else secilen.f2();
    document.getElementById("modal-container").innerHTML = "";
    marketYenile();
    scoutHavuzuYenile();
    switchTab("home");
  };
}
</script>
