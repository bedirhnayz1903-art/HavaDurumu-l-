<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FutStory - Efsanelerin Hikayeleri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .font-serif { font-family: 'Cinzel', serif; }

        .fut-logo {
            position: relative;
            width: 120px;
            height: 140px;
            background: linear-gradient(135deg, #065f46 0%, #022c22 100%);
            border-radius: 50% 50% 50% 50% / 15% 15% 85% 85%;
            border: 4px solid #fbbf24;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4), inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .fut-logo::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        .fut-logo-inner {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            color: #fbbf24;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            z-index: 10;
        }
        .fut-logo-small { width: 40px; height: 50px; border-width: 2px; }
        .fut-logo-small .fut-logo-inner { font-size: 1.2rem; }
        @keyframes shine {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }
        .splash-screen {
            position: fixed; inset: 0;
            background-color: #0f172a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out;
        }
        .splash-hidden { opacity: 0; pointer-events: none; }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            transition: all 0.3s ease;
            position: relative;
        }
        .glass-card:hover {
            border-color: rgba(251, 191, 36, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(251, 191, 36, 0.1);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }

        /* --- FOTOĞRAF --- */
        .player-photo-wrap {
            width: 68px; height: 68px;
            border-radius: 9999px;
            overflow: hidden;
            border: 2px solid rgba(251, 191, 36, 0.5);
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 0.6rem;
            position: relative;
            flex-shrink: 0;
        }
        .player-photo-wrap img {
            width: 100%; height: 100%; object-fit: cover; object-position: top;
            display: none;
        }
        .player-photo-wrap img.loaded { display: block; }
        .player-photo-wrap .flag-fallback {
            font-size: 1.9rem;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }
        .player-photo-wrap.big { width: 128px; height: 128px; border-width: 3px; }
        .player-photo-wrap.big .flag-fallback { font-size: 3.2rem; }
        .flag-badge-mini {
            position: absolute;
            bottom: -2px; right: -2px;
            font-size: 0.9rem;
            background: #0f172a;
            border-radius: 9999px;
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(251, 191, 36, 0.5);
        }
        .player-photo-wrap.big .flag-badge-mini { width: 30px; height: 30px; font-size: 1.3rem; }

        /* Favori Yıldızı (Kart üzerinde) */
        .fav-btn-card {
            position: absolute; top: 6px; right: 6px;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.6);
            z-index: 20;
            transition: transform 0.2s ease;
        }
        .fav-btn-card:active { transform: scale(0.85); }
        .fav-btn-card svg { width: 16px; height: 16px; transition: all 0.2s ease; }

        /* Filtre Sekmeleri */
        .filter-chip {
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #334155;
            color: #94a3b8;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .filter-chip.active { background: #fbbf24; color: #0f172a; border-color: #fbbf24; }

        /* Rastgele Keşfet FAB */
        .fab-random {
            position: absolute; bottom: 20px; right: 20px;
            width: 56px; height: 56px;
            border-radius: 9999px;
            background: linear-gradient(135deg, #059669, #047857);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(5, 150, 105, 0.5);
            z-index: 30;
            border: 2px solid rgba(251, 191, 36, 0.4);
            transition: transform 0.2s ease;
        }
        .fab-random:active { transform: scale(0.9) rotate(15deg); }

        /* Detay Ekranı Aksiyon Butonları */
        .action-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            padding: 0.6rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.5);
            color: #cbd5e1;
            transition: all 0.2s ease;
        }
        .action-btn:active { transform: scale(0.94); }
        .action-btn.fav-active { color: #fbbf24; border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .action-btn.speak-active {
            color: #34d399; border-color: #34d399; background: rgba(52, 211, 153, 0.1);
            animation: pulse-speak 1.4s infinite;
        }
        .action-btn:disabled { opacity: 0.4; }
        @keyframes pulse-speak {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        }

        /* Bilgi Rozetleri (doğum yeri/tarihi/yaş) */
        .info-pill {
            display: flex; flex-direction: column;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            min-width: 90px;
            flex: 1;
        }
        .info-pill .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 0.15rem; }
        .info-pill .value { font-size: 0.85rem; font-weight: 700; color: #f8fafc; text-align: center; }
        .info-pill.deceased .value { color: #fca5a5; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b; border: 1px solid #fbbf24; color: #f8fafc;
            padding: 0.7rem 1.3rem; border-radius: 9999px;
            font-size: 0.85rem; font-weight: 600;
            z-index: 9998;
            opacity: 0; pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Paylaş Modalı */
        .share-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 9990;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .share-modal-overlay.show { opacity: 1; pointer-events: auto; }
        .share-modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-top: 2px solid #fbbf24;
            border-radius: 1.5rem 1.5rem 0 0;
            width: 100%; max-width: 480px;
            padding: 1.5rem 1.25rem 2rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .share-modal-overlay.show .share-modal { transform: translateY(0); }
        .share-option {
            display: flex; align-items: center; gap: 0.9rem;
            padding: 0.85rem 0.5rem;
            border-radius: 0.9rem;
            transition: background 0.15s ease;
            font-weight: 600;
        }
        .share-option:active { background: rgba(255,255,255,0.06); }
        .share-icon {
            width: 42px; height: 42px; border-radius: 9999px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="selection:bg-yellow-500 selection:text-slate-900">

    <!-- AÇILIŞ EKRANI -->
    <div id="splash-screen" class="splash-screen">
        <div class="fut-logo mb-6">
            <div class="fut-logo-inner"><span>F</span><span style="font-size: 1.5rem; margin-top: -5px;">S</span></div>
        </div>
        <h1 class="font-serif text-3xl font-bold text-yellow-400 tracking-wider">FutStory</h1>
        <p id="splash-tagline" class="text-slate-400 mt-2 tracking-widest text-sm uppercase">Efsanelerin Gerçek Hikayeleri</p>
    </div>

    <div id="toast" class="toast"></div>

    <!-- PAYLAŞ MODALI -->

        <div class="share-modal" onclick="event.stopPropagation()">
            <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"></div>
            <h3 id="share-modal-title" class="font-serif text-lg text-yellow-400 font-bold mb-4 text-center">Nereye Paylaşmak İstersin?</h3>
            <div class="flex flex-col gap-1">
                <button onclick="doSystemShare()" class="share-option">

                    </div>
                    <span id="share-opt-system">Diğer Uygulamalar</span>
                </button>
                <button onclick="doShareTo('whatsapp')" class="share-option">
                    <div class="share-icon" style="background:#25D366;">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.39 1.26 4.81L2 22l5.42-1.42c1.36.74 2.92 1.17 4.58 1.17h.01c5.46 0 9.91-4.45 9.91-9.91C21.92 6.45 17.5 2 12.04 2zm5.79 14.02c-.24.68-1.4 1.31-1.94 1.39-.5.08-1.12.11-1.81-.11-.42-.13-.95-.31-1.63-.6-2.87-1.24-4.74-4.13-4.88-4.32-.14-.19-1.16-1.54-1.16-2.94 0-1.4.73-2.09 1-2.38.24-.27.53-.34.71-.34.18 0 .36 0 .51.01.16.01.38-.06.6.46.24.57.81 1.98.88 2.12.07.14.12.31.02.5-.1.19-.15.31-.29.48-.15.17-.31.38-.44.51-.15.15-.3.31-.13.6.17.29.75 1.24 1.62 2.01 1.11.99 2.05 1.3 2.34 1.44.29.15.46.13.63-.05.17-.19.72-.84.91-1.13.19-.29.38-.24.63-.14.26.1 1.65.78 1.94.92.29.14.48.21.55.33.07.12.07.68-.17 1.35z"/></svg>
                    </div>
                    <span>WhatsApp</span>
                </button>
                <button onclick="doShareTo('telegram')" class="share-option">
                    <div class="share-icon" style="background:#2AABEE;">
                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M21.94 4.36c.26-1.1-.83-1.98-1.86-1.57L2.4 9.9c-1.1.44-1.09 2 .02 2.42l4.4 1.67 2.28 6.96c.28.85 1.36 1.06 1.98.4l2.62-2.79 4.55 3.4c.86.64 2.1.18 2.34-.87l3.35-15.73zM7.9 13.05l9.7-6.05c.28-.17.55.19.31.4l-7.9 7.2-.35 3.28-1.44-4.83z"/></svg>
                    </div>
                    <span>Telegram</span>
                </button>
                <button onclick="doShareTo('twitter')" class="share-option">

                        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </div>
                    <span>X (Twitter)</span>
                </button>
                <button onclick="doShareTo('copy')" class="share-option">
                    <div class="share-icon" style="background:#334155;">
                        <svg class="w-5 h-5 text-slate-100" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </div>
                    <span id="share-opt-copy">Bağlantıyı Kopyala</span>
                </button>
                <button onclick="closeShareModal()" class="share-option justify-center text-slate-400 mt-1">
                    <span id="share-opt-cancel">Vazgeç</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div class="max-w-4xl mx-auto flex flex-col h-screen relative">
        
        <header class="flex-none pt-6 pb-4 px-4 flex justify-between items-center z-10 relative">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="goBack()">
                <div class="fut-logo fut-logo-small"><div class="fut-logo-inner">F</div></div>
                <h1 class="font-serif text-2xl font-bold text-yellow-400 tracking-widest">FutStory</h1>
            </div>
            <div class="flex bg-slate-800 rounded-full p-1 border border-slate-700 shadow-inner" id="lang-selector">
                <button onclick="setLang('tr')" id="btn-tr" class="lang-btn uppercase text-xs font-bold px-3 py-1.5 rounded-full transition-colors bg-yellow-500 text-slate-900 shadow-md">TR</button>
                <button onclick="setLang('en')" id="btn-en" class="lang-btn uppercase text-xs font-bold px-3 py-1.5 rounded-full transition-colors text-slate-400 hover:text-white">EN</button>
                <button onclick="setLang('es')" id="btn-es" class="lang-btn uppercase text-xs font-bold px-3 py-1.5 rounded-full transition-colors text-slate-400 hover:text-white">ES</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <!-- LİSTE EKRANI -->
            <div id="home-view" class="flex-1 flex flex-col px-4 pb-8 overflow-hidden relative">
                <div class="mb-3 relative group flex-none">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400 group-focus-within:text-yellow-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="search-input" placeholder="Futbolcu ara..." oninput="handleSearch(this.value)"
                        class="w-full bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-2xl py-3 pl-12 pr-4 focus:outline-none focus:border-yellow-500 transition-colors shadow-lg">
                </div>

                <div class="flex gap-2 mb-4 flex-none">
                    <button onclick="setFilter('all')" id="chip-all" class="filter-chip active">Tümü</button>
                    <button onclick="setFilter('favorites')" id="chip-favorites" class="filter-chip">⭐ Favorilerim</button>
                </div>

                <div id="grid-container" class="flex-1 overflow-y-auto pb-6"></div>

                <button onclick="randomPlayer()" class="fab-random" title="Rastgele Efsane">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <!-- DETAY EKRANI -->
            <div id="detail-view" class="hidden flex-1 overflow-y-auto px-4 pb-12 pt-4">
                <button onclick="goBack()" class="flex items-center text-slate-400 hover:text-yellow-400 transition-colors mb-6 font-semibold">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span id="back-text">Geri Dön</span>
                </button>

                <div class="bg-slate-800 rounded-3xl p-6 md:p-10 border border-slate-700 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-500 opacity-5 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

                    <div class="flex flex-col items-center text-center mb-5">
                        <div id="detail-photo-wrap" class="player-photo-wrap big mb-4">
                            <img id="detail-photo-img" src="" alt="">
                            <span id="detail-photo-fallback" class="flag-fallback"></span>
                            <span id="detail-flag-badge" class="flag-badge-mini"></span>
                        </div>
                        <h2 id="detail-name" class="font-serif text-3xl md:text-5xl font-bold text-yellow-400 mb-2"></h2>
                        <div class="w-16 h-1 bg-emerald-600 rounded-full mt-2"></div>
                    </div>

                    <!-- Bilgi Rozetleri -->
                    <div class="flex gap-2 mb-6 flex-wrap justify-center">
                        <div class="info-pill">
                            <span class="label" id="pill-place-label">Doğum Yeri</span>
                            <span class="value" id="pill-place-value"></span>
                        </div>
                        <div class="info-pill" id="pill-date-container">
                            <span class="label" id="pill-date-label">Doğum Tarihi</span>
                            <span class="value" id="pill-date-value"></span>
                        </div>
                        <div class="info-pill" id="pill-age-container">
                            <span class="label" id="pill-age-label">Yaş</span>
                            <span class="value" id="pill-age-value"></span>
                        </div>
                    </div>

                    <div class="flex justify-center gap-2 mb-8 flex-wrap relative z-10">
                        <button id="detail-fav-btn" onclick="toggleFavorite(selectedPlayer.id)" class="action-btn">
                            <svg id="detail-fav-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                            <span id="detail-fav-text">Favorile</span>
                        </button>
                        <button id="detail-speak-btn" onclick="toggleSpeak()" class="action-btn">
                            <svg id="detail-speak-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                            </svg>
                            <span id="detail-speak-text">Dinle</span>
                        </button>
                        <button onclick="openShareModal()" class="action-btn">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342a3 3 0 100 4.316m0-4.316a3 3 0 100 4.316m9.632-4.316a3 3 0 100-4.316m0 4.316a3 3 0 100 4.316m0 0l-9.632-4.316m9.632-9.316L8.684 8.658" />
                            </svg>
                            <span id="detail-share-text">Paylaş</span>
                        </button>
                    </div>

                    <div class="prose prose-invert max-w-none">
                        <p id="detail-story" class="text-lg md:text-xl text-slate-300 leading-relaxed font-light text-justify md:text-center italic"></p>

                es: "Nació el 25 de abril de 1947 en Ámsterdam, a pocos cientos de metros del estadio del Ajax, donde su padre tenía una tienda de comestibles cerca. Perdió a su padre a los 12 años y creció en la cantera del Ajax. Con la filosofía del 'Fútbol Total' que desarrolló junto a Rinus Michels, transformó al Ajax y a la selección holandesa en los equipos más fascinantes de los años 70, ganando 3 Balones de Oro. Se mudó al Barcelona en 1973 y revivió al club tras años de dictadura. Después de su carrera como jugador, revolucionó también el banquillo, regalando al fútbol la 'Cruyff turn' y siendo el arquitecto de la filosofía tiki-taka que define al Barcelona moderno. Murió de cáncer de pulmón el 24 de marzo de 2016 a los 68 años."
