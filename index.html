              birthPlace: { tr: "Fuentealbilla, İspanya", en: "Fuentealbilla, Spain", es: "Fuentealbilla, España" },
              story: {
                tr: "11 Mayıs 1984'te İspanya'nın küçük Fuentealbilla kasabasında doğdu. 12 yaşında ailesinden ayrılıp Barcelona'nın La Masia yatılı akademisine katıldığında çok utangaç ve ev hasreti çeken bir çocuktu; ilk geceler ağlayarak uyuduğu bilinir. Barcelona'nın altın çağının kalbi oldu, Xavi ile kurduğu ortaklık tiki-taka futbolunun temeliydi. 2010 Dünya Kupası finalinde, uzatma dakikalarında attığı golle İspanya'ya tarihinin ilk ve tek Dünya Kupası'nı kazandırdı; o gol Fuentealbilla'da bir heykelle ölümsüzleştirildi. Barcelona'da 4 Şampiyonlar Ligi kazandıktan sonra kariyerinin son yıllarını Japonya'nın Vissel Kobe kulübünde sürdürdü, 2023'te profesyonel futbola veda etti.",
                en: "Born on 11 May 1984 in the small town of Fuentealbilla, Spain. When he left home at 12 to join Barcelona's La Masia boarding academy, he was a deeply shy, homesick boy known to cry himself to sleep in his first nights there. He became the heart of Barcelona's golden era, with his partnership alongside Xavi forming the foundation of tiki-taka football. His extra-time goal in the 2010 World Cup final gave Spain its first and only World Cup, a goal immortalized with a statue in Fuentealbilla. After winning 4 Champions Leagues with Barcelona, he spent the final years of his career at Vissel Kobe in Japan, retiring from professional football in 2023.",
                es: "Nació el 11 de mayo de 1984 en el pequeño pueblo de Fuentealbilla, España. Cuando dejó su hogar a los 12 años para unirse al internado de La Masia del Barcelona, era un niño muy tímido y con nostalgia, conocido por llorar hasta quedarse dormido en sus primeras noches allí. Se convirtió en el corazón de la era dorada del Barcelona, y su sociedad con Xavi fue la base del fútbol tiki-taka. Su gol en la prórroga de la final del Mundial 2010 le dio a España su primera y única Copa del Mundo, un gol inmortalizado con una estatua en Fuentealbilla. Tras ganar 4 Champions League con el Barcelona, pasó los últimos años de su carrera en el Vissel Kobe de Japón, retirándose del fútbol profesional en 2023."
              }},
            { id: 10, name: "Xavi Hernández", flag: "🇪🇸", wikiTitle: "Xavi", birthDate: "1980-01-25",
              birthPlace: { tr: "Terrassa, İspanya", en: "Terrassa, Spain", es: "Terrassa, España" },
              story: {
                tr: "25 Ocak 1980'de İspanya'nın Terrassa kentinde doğdu. 11 yaşında La Masia'ya katıldı ve orada geliştirdiği pas oyunuyla sahanın geometrisini herkesten iyi gören bir 'Kuklacı' oldu. Barcelona'da 17 yıl boyunca 767 resmi maça çıktı, 8 La Liga ve 4 Şampiyonlar Ligi şampiyonluğu kazandı. Tiki-taka sisteminin kalbiydi; topu kaybetmesi neredeyse imkansız kabul edilirdi. İspanya Milli Takımı ile 2008 ve 2012 Avrupa Şampiyonalarını, 2010 Dünya Kupası'nı kazanarak İspanya futbol tarihinin en başarılı neslinin lideri oldu. Kariyerinin sonunda Katar'da oynadı, ardından teknik direktör olarak Barcelona'ya döndü ve kulübü 2023'te yeniden La Liga şampiyonu yaptı.",
                en: "Born on 25 January 1980 in Terrassa, Spain. He joined La Masia at 11 and developed a passing game there that let him read the geometry of the pitch better than anyone, earning him the nickname 'the Puppet Master'. He played 767 official matches for Barcelona over 17 years, winning 8 La Liga titles and 4 Champions Leagues. He was the heart of the tiki-taka system, considered almost impossible to dispossess. With the Spanish national team he won the 2008 and 2012 European Championships and the 2010 World Cup, leading the most successful generation in Spanish football history. He finished his playing career in Qatar, then returned to Barcelona as manager, guiding the club back to a La Liga title in 2023.",
                es: "Nació el 25 de enero de 1980 en Terrassa, España. Se unió a La Masia a los 11 años y desarrolló allí un juego de pases que le permitía leer la geometría del campo mejor que nadie, ganándose el apodo de 'el Titiritero'. Jugó 767 partidos oficiales para el Barcelona a lo largo de 17 años, ganando 8 títulos de La Liga y 4 Champions League. Fue el corazón del sistema tiki-taka, considerado casi imposible de desposeer del balón. Con la selección española ganó las Eurocopas de 2008 y 2012 y el Mundial de 2010, liderando la generación más exitosa de la historia del fútbol español. Terminó su carrera como jugador en Catar, luego regresó al Barcelona como entrenador, llevando al club de nuevo al título de La Liga en 2023."
              }},
            { id: 11, name: "Thierry Henry", flag: "🇫🇷", wikiTitle: "Thierry_Henry", birthDate: "1977-08-17",
              birthPlace: { tr: "Les Ulis, Fransa", en: "Les Ulis, France", es: "Les Ulis, Francia" },
              story: {
                tr: "17 Ağustos 1977'de Paris yakınlarındaki Les Ulis'te doğdu. Kariyerine Monaco'da başladı, 1998 Dünya Kupası'nı Fransa ile kazandı. Juventus'ta kanat oyuncusu olarak başarısız bir dönem geçirdikten sonra Arsene Wenger tarafından Arsenal'e getirildi ve orada forvete dönüştürülerek tarihin en golcü oyuncularından biri haline geldi. 2003-04 sezonunda Arsenal'in tek maç kaybetmeden şampiyon olduğu 'Invincibles' (Yenilmezler) kadrosunun yıldızıydı. İnanılmaz hızı, zarafeti ve topu köşeye plase etme becerisiyle Premier Lig tarihinin en beğenilen forvetlerinden oldu; kulüpte 228 golle rekor kırdı. Kariyerinin sonunda Barcelona ve New York Red Bulls'ta oynadı; bugün televizyon yorumculuğu ve teknik direktörlük yapıyor.",
                en: "Born on 17 August 1977 in Les Ulis, near Paris. He began his career at Monaco and won the 1998 World Cup with France. After a difficult spell as a struggling winger at Juventus, he was brought to Arsenal by Arsène Wenger and transformed into a striker, becoming one of the greatest goalscorers in history. He was the star of Arsenal's 'Invincibles' side that won the 2003-04 title without losing a single match. With incredible pace, elegance, and a signature finish curled into the far corner, he became one of the most beloved strikers in Premier League history, setting the club's all-time scoring record with 228 goals. He finished his career at Barcelona and New York Red Bulls, and today works as a TV pundit and manager.",
                es: "Nació el 17 de agosto de 1977 en Les Ulis, cerca de París. Comenzó su carrera en el Mónaco y ganó el Mundial 1998 con Francia. Tras un difícil período como extremo en la Juventus, fue llevado al Arsenal por Arsène Wenger y transformado en delantero, convirtiéndose en uno de los mayores goleadores de la historia. Fue la estrella del equipo 'Invencible' del Arsenal que ganó el título 2003-04 sin perder un solo partido. Con un ritmo increíble, elegancia y su característico remate curvado a la escuadra, se convirtió en uno de los delanteros más queridos de la historia de la Premier League, estableciendo el récord goleador del club con 228 tantos. Terminó su carrera en el Barcelona y el New York Red Bulls; hoy trabaja como comentarista de televisión y entrenador."
              }},
            { id: 12, name: "Ronaldo Nazário", flag: "🇧🇷", wikiTitle: "Ronaldo_(Brazilian_footballer)", birthDate: "1976-09-22",
              birthPlace: { tr: "Rio de Janeiro, Brezilya", en: "Rio de Janeiro, Brazil", es: "Río de Janeiro, Brasil" },
              story: {
                tr: "22 Eylül 1976'da Rio de Janeiro'nun yoksul Bento Ribeiro mahallesinde doğdu. 'O Fenômeno' (Fenomen) lakabıyla anılan Ronaldo, henüz 17 yaşındayken Cruzeiro'da patlama yaptı, ardından PSV Eindhoven ve Barcelona'da inanılmaz gol ortalamaları tuttu. 1998 Dünya Kupası finalinde geçirdiği gizemli kriz hâlâ tartışılır. Real Madrid'e transfer olduktan sonra iki kez ağır diz kapağı yaralanması geçirdi ve kariyerinin bitmesi bekleniyordu; ancak inanılmaz bir azimle 2002 Dünya Kupası'na döndü, 8 golle gol kralı oldu ve Brezilya'yı şampiyon yaptı. Bu geri dönüş futbol tarihinin en büyük mucizelerinden sayılır. Kariyerinin sonunda Milan ve Corinthians'ta oynadı; bugün Real Valladolid kulübünün sahibi.",
                en: "Born on 22 September 1976 in the poor Bento Ribeiro neighborhood of Rio de Janeiro. Known as 'O Fenômeno' (The Phenomenon), he burst onto the scene at Cruzeiro at just 17, then posted extraordinary scoring ratios at PSV Eindhoven and Barcelona. The mysterious seizure he suffered before the 1998 World Cup final is still debated today. After moving to Real Madrid, he suffered two devastating knee injuries that were expected to end his career; yet with remarkable determination he returned for the 2002 World Cup, finished as top scorer with 8 goals, and led Brazil to the title. That comeback is considered one of the greatest miracles in football history. He finished his career at Milan and Corinthians; today he is the owner of Real Valladolid.",
                es: "Nació el 22 de septiembre de 1976 en el humilde barrio de Bento Ribeiro, Río de Janeiro. Conocido como 'O Fenômeno', irrumpió en el Cruzeiro con solo 17 años, luego mantuvo promedios goleadores extraordinarios en el PSV Eindhoven y el Barcelona. La misteriosa convulsión que sufrió antes de la final del Mundial 1998 todavía se debate hoy. Tras fichar por el Real Madrid, sufrió dos devastadoras lesiones de rodilla que se esperaba terminaran su carrera; sin embargo, con una determinación notable, regresó para el Mundial 2002, terminó como máximo goleador con 8 goles y llevó a Brasil al título. Ese regreso se considera uno de los mayores milagros en la historia del fútbol. Terminó su carrera en el Milan y el Corinthians; hoy es propietario del Real Valladolid."
              }},
            { id: 13, name: "Franz Beckenbauer", flag: "🇩🇪", wikiTitle: "Franz_Beckenbauer", birthDate: "1945-09-11", deathDate: "2024-01-07",
              birthPlace: { tr: "Münih, Almanya", en: "Munich, Germany", es: "Múnich, Alemania" },
              story: {
                tr: "11 Eylül 1945'te İkinci Dünya Savaşı'nın hemen ardından Münih'te doğdu. Bayern Münih'in efsanevi altyapısında yetişti ve libero pozisyonunu icat eden isim olarak futbol taktiklerini kökten değiştirdi; savunmadan topla ileri çıkıp hücumu başlatan ilk modern stoper oldu. 'Der Kaiser' (İmparator) lakabıyla anılan Beckenbauer, Bayern Münih ile 3 kez Şampiyon Kulüpler Kupası kazandı ve 1974'te Batı Almanya'yı kaptan olarak Dünya Kupası şampiyonu yaptı. 1990'da bu kez teknik direktör olarak Batı Almanya'yı yeniden şampiyon yaparak, hem oyuncu hem teknik direktör olarak Dünya Kupası kazanan nadir isimlerden biri oldu. 2006 Dünya Kupası'nın Almanya'da düzenlenmesinde kilit rol oynadı. 7 Ocak 2024'te 78 yaşında hayatını kaybetti.",
                en: "Born on 11 September 1945 in Munich, shortly after the end of World War II. Raised in Bayern Munich's storied youth system, he fundamentally changed football tactics by inventing the sweeper (libero) role, becoming the first modern defender to carry the ball forward from the back to launch attacks. Nicknamed 'Der Kaiser' (The Emperor), he won 3 European Cups with Bayern Munich and captained West Germany to the 1974 World Cup title. In 1990 he led West Germany to another World Cup title, this time as manager, becoming one of the rare figures to win the World Cup as both player and coach. He played a key role in bringing the 2006 World Cup to Germany. He died on 7 January 2024 at age 78.",
                es: "Nació el 11 de septiembre de 1945 en Múnich, poco después del final de la Segunda Guerra Mundial. Formado en la histórica cantera del Bayern Múnich, cambió fundamentalmente la táctica futbolística al inventar el rol del líbero, convirtiéndose en el primer defensor moderno en llevar el balón desde atrás para iniciar ataques. Apodado 'Der Kaiser' (El Emperador), ganó 3 Copas de Europa con el Bayern Múnich y capitaneó a Alemania Occidental hacia el título del Mundial 1974. En 1990 llevó a Alemania Occidental a otro título mundial, esta vez como entrenador, convirtiéndose en una de las raras figuras en ganar el Mundial como jugador y como entrenador. Jugó un papel clave para traer el Mundial 2006 a Alemania. Falleció el 7 de enero de 2024 a los 78 años."
              }},
            { id: 14, name: "Roberto Baggio", flag: "🇮🇹", wikiTitle: "Roberto_Baggio", birthDate: "1967-02-18",
              birthPlace: { tr: "Caldogno, İtalya", en: "Caldogno, Italy", es: "Caldogno, Italia" },
              story: {
                tr: "18 Şubat 1967'de İtalya'nın Caldogno kasabasında doğdu. Kariyeri boyunca dizinden 6 kez ağır ameliyat geçirmesine rağmen olağanüstü tekniği ve şık oyunuyla İtalya'yı büyüledi. Fiorentina'dan Juventus'a transferi, taraftarları isyan ettirecek kadar tartışmalıydı. 1993'te Ballon d'Or ve dünyanın yılın futbolcusu ödüllerini kazandı. 'İlahi Atkuyruklu' lakabıyla anılan Baggio, 1994 Dünya Kupası finalinde İtalya'yı neredeyse tek başına finale taşıdı ancak penaltı atışlarında kaçırdığı vuruş kariyerinin en büyük dramı oldu; buna rağmen sportmenliği ve zarafetiyle hafızalarda kaldı. Budist inancı ve doğa sporlarına olan tutkusuyla da tanınan Baggio, futbolun en sevilen sanatçılarından biri olarak anılıyor.",
                en: "Born on 18 February 1967 in Caldogno, Italy. Despite enduring six major knee surgeries throughout his career, his extraordinary technique and stylish play mesmerized Italy. His transfer from Fiorentina to Juventus was so controversial it sparked riots among fans. He won the Ballon d'Or and World Player of the Year award in 1993. Nicknamed 'the Divine Ponytail', Baggio almost single-handedly carried Italy to the 1994 World Cup final, but the penalty he missed in the shootout became the greatest heartbreak of his career; despite that, his sportsmanship and grace kept him beloved. Known also for his Buddhist faith and passion for nature and conservation, Baggio is remembered as one of football's most cherished artists.",
                es: "Nació el 18 de febrero de 1967 en Caldogno, Italia. A pesar de soportar seis cirugías importantes de rodilla a lo largo de su carrera, su técnica extraordinaria y su elegante juego hipnotizaron a Italia. Su fichaje de la Fiorentina a la Juventus fue tan controvertido que provocó disturbios entre los aficionados. Ganó el Balón de Oro y el premio al Jugador del Año en 1993. Apodado 'la Divina Coleta', Baggio llevó prácticamente solo a Italia a la final del Mundial 1994, pero el penal que falló en la tanda se convirtió en el mayor drama de su carrera; a pesar de ello, su deportividad y elegancia lo mantuvieron querido. Conocido también por su fe budista y su pasión por la naturaleza, Baggio es recordado como uno de los artistas más queridos del fútbol."
              }},
            { id: 15, name: "Gianluigi Buffon", flag: "🇮🇹", wikiTitle: "Gianluigi_Buffon", birthDate: "1978-01-28",
              birthPlace: { tr: "Carrara, İtalya", en: "Carrara, Italy", es: "Carrara, Italia" },
              story: {
                tr: "28 Ocak 1978'de İtalya'nın mermer şehri Carrara'da, sporcu bir aileden geldi; annesi disk atma şampiyonu, babası ağır sıklet halterciydi. Parma'da henüz 17 yaşındayken Serie A'ya çıktı ve dönemin rekor transfer bedeliyle Juventus'a katıldı. Kulüpte 17 sezon geçirdi, 2006 Dünya Kupası'nda İtalya'nın şampiyonluğunun en büyük mimarlarından biriydi ve turnuvada sadece 2 gol yedi. Refleksleri, liderliği ve uzun ömürlülüğüyle tanınan Buffon, 45 yaşına kadar üst düzey futbol oynayarak kaleciliğin en tutkulu sembollerinden biri oldu. Kariyerinin son yıllarında Paris Saint-Germain'de de forma giydi, 2023'te Parma'ya dönerek kariyerine memleket kulübünde veda etti.",
                en: "Born on 28 January 1978 in Carrara, Italy's marble city, into a family of athletes; his mother was a discus champion and his father a heavyweight weightlifter. He debuted in Serie A at just 17 with Parma and joined Juventus for a then-record transfer fee for a goalkeeper. He spent 17 seasons at the club, was a key architect of Italy's 2006 World Cup triumph, conceding just 2 goals in the entire tournament. Renowned for his reflexes, leadership, and longevity, Buffon played top-level football until age 45, becoming one of the most passionate symbols of goalkeeping. He also played for Paris Saint-Germain late in his career, returning to Parma in 2023 to close his career at the club where it all began.",
                es: "Nació el 28 de enero de 1978 en Carrara, la ciudad del mármol italiana, en una familia de atletas; su madre fue campeona de lanzamiento de disco y su padre halterófilo de peso pesado. Debutó en la Serie A con apenas 17 años en el Parma y fichó por la Juventus por una cifra entonces récord para un portero. Pasó 17 temporadas en el club, fue arquitecto clave del título mundial de Italia en 2006, recibiendo solo 2 goles en todo el torneo. Reconocido por sus reflejos, liderazgo y longevidad, Buffon jugó a alto nivel hasta los 45 años, convirtiéndose en uno de los símbolos más apasionados de la portería. También jugó para el Paris Saint-Germain al final de su carrera, regresando al Parma en 2023 para cerrar su carrera en el club donde todo comenzó."
              }},
            { id: 16, name: "Iker Casillas", flag: "🇪🇸", wikiTitle: "Iker_Casillas", birthDate: "1981-05-20",
              birthPlace: { tr: "Móstoles, İspanya", en: "Móstoles, Spain", es: "Móstoles, España" },
              story: {
                tr: "20 Mayıs 1981'de Madrid yakınlarındaki Móstoles'te doğdu. Real Madrid'in altyapısına 9 yaşında katıldı, henüz 19 yaşındayken 2000 Şampiyonlar Ligi finalinde forma giyerek kulübün en genç kalecilerinden biri olarak kupayı kaldırdı. Kulüpte 25 yıl geçirdi, 3 Şampiyonlar Ligi kazandı ve rekor sayıda maça çıktı. İspanya Milli Takımı'nın kaptanı olarak 2008 ve 2012 Avrupa şampiyonluklarına, 2010'da ise ülkesinin ilk Dünya Kupası'na öncülük etti; finalde Arjen Robben'in kritik pozisyonda attığı şutu ayağıyla çıkararak İspanya'nın kaderini değiştirdiği an futbol tarihine geçti. Refleksleri ve sahadaki liderliğiyle 'San Iker' (Aziz Iker) lakabını aldı. Kariyerinin son yıllarını Porto'da geçirdi, geçirdiği kalp krizi sonrası 2020'de futbola veda etti.",
                en: "Born on 20 May 1981 in Móstoles, near Madrid. He joined Real Madrid's academy at age 9 and, at just 19, lifted the 2000 Champions League as one of the club's youngest-ever keepers to feature in a final. He spent 25 years at the club, winning 3 Champions Leagues and setting appearance records. As captain of the Spanish national team, he led the country to European titles in 2008 and 2012 and to its first-ever World Cup in 2010; his toe-save on Arjen Robben's clear chance in the final is remembered as the moment that changed Spain's destiny. His reflexes and leadership on the pitch earned him the nickname 'San Iker' (Saint Iker). He spent his final playing years at Porto, retiring from football in 2020 after suffering a heart attack.",
                es: "Nació el 20 de mayo de 1981 en Móstoles, cerca de Madrid. Se unió a la cantera del Real Madrid a los 9 años y, con apenas 19, levantó la Champions League de 2000 como uno de los porteros más jóvenes en disputar una final. Pasó 25 años en el club, ganando 3 Champions League y estableciendo récords de partidos disputados. Como capitán de la selección española, lideró al país hacia los títulos europeos de 2008 y 2012 y hacia su primer Mundial en 2010; su parada con el pie al remate claro de Arjen Robben en la final se recuerda como el momento que cambió el destino de España. Sus reflejos y liderazgo en el campo le ganaron el apodo de 'San Iker'. Pasó sus últimos años como jugador en el Oporto, retirándose del fútbol en 2020 tras sufrir un infarto."
              }},
            { id: 17, name: "Lev Yashin", flag: "🇷🇺", wikiTitle: "Lev_Yashin", birthDate: "1929-10-22", deathDate: "1990-03-20",
              birthPlace: { tr: "Moskova, SSCB", en: "Moscow, USSR", es: "Moscú, URSS" },
              story: {
                tr: "22 Ekim 1929'da Moskova'da işçi bir ailenin çocuğu olarak doğdu. İkinci Dünya Savaşı sırasında henüz 12 yaşında fabrikada çalışmak zorunda kaldı. Dinamo Moskova'da kaleci olarak yetişti ve futbol tarihinde Ballon d'Or kazanan ilk ve tek kaleci oldu (1963). Kaleci olarak simsiyah forması, çığlık atarak savunmasını yönlendirmesi ve ceza sahası dışına çıkarak oyuna katılan vizyoner tarzıyla 'Siyah Örümcek' lakabını aldı; kariyeri boyunca tahmini 150 penaltı kurtardı. Sovyetler Birliği ile 1960 Avrupa Şampiyonası'nı kazandı. Modern kaleciliğin babası kabul edilir; FIFA bugün turnuvaların en iyi kalecisine onun anısına 'Yashin Ödülü'nü veriyor. 20 Mart 1990'da 60 yaşında hayatını kaybetti.",
                en: "Born on 22 October 1929 in Moscow to a working-class family. During World War II he was forced to work in a factory at just 12 years old. He rose as a goalkeeper at Dynamo Moscow and became the first and only goalkeeper in football history to win the Ballon d'Or, in 1963. Known for his all-black kit, his commanding shouts directing his defense, and his visionary style of leaving the box to sweep up danger, he earned the nickname 'The Black Spider', saving an estimated 150 penalties over his career. He won the 1960 European Championship with the Soviet Union. Considered the father of modern goalkeeping, FIFA today awards the 'Yashin Trophy' to the best goalkeeper of each World Cup in his honor. He died on 20 March 1990 at age 60.",
                es: "Nació el 22 de octubre de 1929 en Moscú, en una familia trabajadora. Durante la Segunda Guerra Mundial se vio obligado a trabajar en una fábrica con apenas 12 años. Se formó como portero en el Dinamo Moscú y se convirtió en el primer y único portero en la historia del fútbol en ganar el Balón de Oro, en 1963. Conocido por su uniforme completamente negro, sus gritos dirigiendo a su defensa y su estilo visionario de salir del área para despejar peligros, se ganó el apodo de 'La Araña Negra', atajando un estimado de 150 penales en su carrera. Ganó la Eurocopa de 1960 con la Unión Soviética. Considerado el padre de la portería moderna, la FIFA otorga hoy el 'Trofeo Yashin' al mejor portero de cada Mundial en su honor. Falleció el 20 de marzo de 1990 a los 60 años."
              }},
            { id: 18, name: "George Best", flag: "🏴", wikiTitle: "George_Best", birthDate: "1946-05-22", deathDate: "2005-11-25",
              birthPlace: { tr: "Belfast, Kuzey İrlanda", en: "Belfast, Northern Ireland", es: "Belfast, Irlanda del Norte" },
              story: {
                tr: "22 Mayıs 1946'da Kuzey İrlanda'nın Belfast kentinde doğdu. 15 yaşında Manchester United'a katılmak için İngiltere'ye gitti, ancak ilk günlerde memleket hasretiyle geri döndü; kısa süre sonra tekrar denemek için geri geldi. İnanılmaz çalımları, hızı ve iki ayağını da ustaca kullanabilmesiyle futbolun ilk 'rock yıldızı' oldu; sahadaki yeteneği kadar sahra dışındaki eğlenceli yaşam tarzıyla da manşetlere çıktı. 1968'de Manchester United'ın ilk Şampiyon Kulüpler Kupası'nı kazanmasında kilit rol oynadı ve aynı yıl Ballon d'Or kazandı. 'Pelé iyi, Maradona daha iyi, George en iyisi' sözü futbol folkloruna yerleşti. Alkol bağımlılığıyla uzun süre mücadele etti ve 25 Kasım 2005'te 59 yaşında karaciğer yetmezliği nedeniyle hayatını kaybetti.",
                en: "Born on 22 May 1946 in Belfast, Northern Ireland. He moved to England at 15 to join Manchester United, but was so homesick in his first days that he returned home before coming back to try again shortly after. With incredible dribbling, blistering pace, and equal skill on both feet, he became football's first true rock star, making as many headlines for his colorful lifestyle off the pitch as for his talent on it. He played a key role in Manchester United's first European Cup triumph in 1968 and won the Ballon d'Or that same year. The saying 'Pelé good, Maradona better, George Best' became part of football folklore. He struggled with alcoholism for years and died of liver failure on 25 November 2005 at age 59.",
                es: "Nació el 22 de mayo de 1946 en Belfast, Irlanda del Norte. Se mudó a Inglaterra a los 15 años para unirse al Manchester United, pero sintió tanta nostalgia en sus primeros días que regresó a casa antes de volver a intentarlo poco después. Con un regate increíble, velocidad explosiva y habilidad igual en ambas piernas, se convirtió en la primera verdadera estrella de rock del fútbol, generando tantos titulares por su colorido estilo de vida fuera de la cancha como por su talento dentro de ella. Jugó un papel clave en el primer título de Copa de Europa del Manchester United en 1968 y ganó el Balón de Oro ese mismo año. La frase 'Pelé bueno, Maradona mejor, George el mejor' se volvió parte del folclore futbolístico. Luchó contra el alcoholismo durante años y murió de insuficiencia hepática el 25 de noviembre de 2005 a los 59 años."
              }},
            { id: 19, name: "Ferenc Puskás", flag: "🇭🇺", wikiTitle: "Ferenc_Puskás", birthDate: "1927-04-02", deathDate: "2006-11-17",
              birthPlace: { tr: "Budapeşte, Macaristan", en: "Budapest, Hungary", es: "Budapest, Hungría" },
              story: {
                tr: "2 Nisan 1927'de Budapeşte'de doğdu. Macaristan'ın 1950'lerdeki efsanevi 'Muhteşem Macarlar' (Aranycsapat) takımının lideriydi; bu kadro İngiltere'yi kendi evinde 6-3 yenerek futbol tarihinde çığır açtı. Sol ayağındaki inanılmaz vuruş gücü ve isabetiyle tanınan Puskás, Honvéd ve Macaristan Milli Takımı ile neredeyse yenilmezdi. 1956'da Macar İhtilali sırasında ülkesini terk etti ve İspanya'ya sığındı. 31 yaşında ve fazla kilolu olmasına rağmen Real Madrid tarafından imzalandı; Alfredo Di Stéfano ile kurduğu ortaklık futbol tarihinin en üretken ikililerinden biri oldu, 4 kez İspanya gol kralı oldu. FIFA bugün yılın en güzel golüne onun adına 'Puskás Ödülü'nü veriyor. 17 Kasım 2006'da 79 yaşında Alzheimer komplikasyonları nedeniyle hayatını kaybetti.",
                en: "Born on 2 April 1927 in Budapest. He was the leader of Hungary's legendary 'Mighty Magyars' (Aranycsapat) side of the 1950s, a team that stunned football history by beating England 6-3 on English soil. Known for the incredible power and accuracy of his left foot, Puskás was nearly unbeatable with Honvéd and the Hungarian national team. He fled his country during the 1956 Hungarian Revolution and sought refuge in Spain. Despite being 31 and overweight, he was signed by Real Madrid, and his partnership with Alfredo Di Stéfano became one of the most prolific duos in football history, winning the Spanish top scorer title 4 times. FIFA today awards the 'Puskás Award' for the best goal of the year in his honor. He died on 17 November 2006 at age 79 from complications of Alzheimer's disease.",
                es: "Nació el 2 de abril de 1927 en Budapest. Fue el líder del legendario equipo húngaro 'Aranycsapat' (Magiares Mágicos) de los años 50, un equipo que sorprendió a la historia del fútbol al vencer a Inglaterra 6-3 en suelo inglés. Conocido por la increíble potencia y precisión de su pierna izquierda, Puskás era casi invencible con el Honvéd y la selección húngara. Huyó de su país durante la Revolución Húngara de 1956 y buscó refugio en España. A pesar de tener 31 años y sobrepeso, fue fichado por el Real Madrid, y su sociedad con Alfredo Di Stéfano se convirtió en uno de los dúos más prolíficos de la historia del fútbol, ganando el título de máximo goleador español 4 veces. La FIFA otorga hoy el 'Premio Puskás' al mejor gol del año en su honor. Falleció el 17 de noviembre de 2006 a los 79 años por complicaciones del Alzheimer."
              }},
            { id: 20, name: "Alfredo Di Stéfano", flag: "🇦🇷", wikiTitle: "Alfredo_Di_Stéfano", birthDate: "1926-07-04", deathDate: "2014-07-07",
              birthPlace: { tr: "Buenos Aires, Arjantin", en: "Buenos Aires, Argentina", es: "Buenos Aires, Argentina" },
              story: {
                tr: "4 Temmuz 1926'da Buenos Aires'te İtalyan göçmenlerin torunu olarak doğdu. Kariyerine River Plate'te başladı, ardından Kolombiya liginde forma giydi. 1953'te Real Madrid'e transfer olduğunda hem kulüp hem de futbol tarihini değiştirdi; kulübü Avrupa'nın en büyük gücüne dönüştürerek ilk 5 Şampiyon Kulüpler Kupası'nın tamamını kazandı. Sahanın her bölgesinde -savunmada, orta sahada, forvette- mükemmel performans sergileyebilen, futbol tarihindeki en komple oyuncu olarak kabul edilir. Arjantin, Kolombiya ve İspanya milli takımlarında oynayan nadir isimlerden biridir. 2 kez Ballon d'Or kazandı. Real Madrid'i bugünkü küresel dev haline getiren isim olarak anılır. 7 Temmuz 2014'te, 88. doğum gününden sadece 3 gün sonra, 88 yaşında hayatını kaybetti.",
                en: "Born on 4 July 1926 in Buenos Aires, the grandson of Italian immigrants. He began his career at River Plate, then played in the Colombian league. When he transferred to Real Madrid in 1953, he changed both the club and the sport's history, turning Madrid into Europe's greatest power by winning all of the first 5 European Cups. Capable of excelling in every area of the pitch — defense, midfield, and attack — he is considered the most complete player in football history. He is one of the rare players to have represented Argentina, Colombia, and Spain at national level. He won the Ballon d'Or twice. He is remembered as the man who built Real Madrid into the global giant it is today. He died on 7 July 2014, just 3 days after his 88th birthday.",
                es: "Nació el 4 de julio de 1926 en Buenos Aires, nieto de inmigrantes italianos. Comenzó su carrera en River Plate, luego jugó en la liga colombiana. Cuando fichó por el Real Madrid en 1953, cambió tanto al club como la historia del deporte, convirtiendo al Madrid en la mayor potencia de Europa al ganar las primeras 5 Copas de Europa. Capaz de destacar en cualquier zona del campo, defensa, mediocampo y ataque, es considerado el jugador más completo en la historia del fútbol. Es una de las raras figuras que representó a Argentina, Colombia y España a nivel de selección. Ganó el Balón de Oro dos veces. Se le recuerda como el hombre que construyó al Real Madrid como el gigante global que es hoy. Falleció el 7 de julio de 2014, apenas 3 días después de cumplir 88 años."
              }},
            { id: 21, name: "Garrincha", flag: "🇧🇷", wikiTitle: "Garrincha", birthDate: "1933-10-28", deathDate: "1983-01-20",
              birthPlace: { tr: "Pau Grande, Brezilya", en: "Pau Grande, Brazil", es: "Pau Grande, Brasil" },
              story: {
                tr: "28 Ekim 1933'te Brezilya'nın küçük Pau Grande köyünde doğdu. Çarpık bacaklarla dünyaya geldi; sağ bacağı sol bacağından altı santim daha kısaydı ve doktorlar hiçbir zaman yürüyemeyeceğini söyledi. Yoksul bir çocukluk geçirdi ve resmi bir futbol eğitimi almadı. Buna rağmen dribbling (top sürme) yeteneğiyle futbol tarihinin gelmiş geçmiş en özel oyuncularından biri oldu; rakiplerini adeta oyuncak gibi geçerdi. 1958 ve 1962 Dünya Kupalarını Pelé ile birlikte Brezilya'ya kazandırdı; özellikle 1962'de Pelé sakatlanınca takımı neredeyse tek başına şampiyon yaptı ve turnuvanın en iyi oyuncusu seçildi. Sahra dışındaki mücadeleleri ve alkol bağımlılığı nedeniyle kariyeri erken söndü; 20 Ocak 1983'te 49 yaşında sirozdan hayatını kaybetti.",
                en: "Born on 28 October 1933 in the small village of Pau Grande, Brazil. He was born with distorted legs, his right leg six centimeters shorter than his left, and doctors said he would never walk. He had an impoverished childhood and never received formal football training. Despite this, his dribbling ability made him one of the most extraordinary players in the game's history, able to leave defenders looking like they were standing still. He helped Brazil win the 1958 and 1962 World Cups alongside Pelé, and in 1962 in particular, when Pelé was injured, he practically carried the team to the title alone and was named the tournament's best player. Struggles off the pitch and alcoholism cut his career short; he died of cirrhosis on 20 January 1983 at age 49.",
                es: "Nació el 28 de octubre de 1933 en el pequeño pueblo de Pau Grande, Brasil. Nació con las piernas torcidas, la derecha seis centímetros más corta que la izquierda, y los médicos dijeron que nunca caminaría. Tuvo una infancia pobre y nunca recibió formación futbolística formal. A pesar de ello, su habilidad para el regate lo convirtió en uno de los jugadores más extraordinarios de la historia del deporte, capaz de dejar a los defensores como estatuas. Ayudó a Brasil a ganar los Mundiales de 1958 y 1962 junto a Pelé, y en 1962 en particular, cuando Pelé se lesionó, prácticamente cargó al equipo solo hacia el título y fue nombrado el mejor jugador del torneo. Sus luchas fuera de la cancha y el alcoholismo truncaron su carrera; murió de cirrosis el 20 de enero de 1983 a los 49 años."
              }},
            { id: 22, name: "Michel Platini", flag: "🇫🇷", wikiTitle: "Michel_Platini", birthDate: "1955-06-21",
              birthPlace: { tr: "Joeuf, Fransa", en: "Joeuf, France", es: "Joeuf, Francia" },
              story: {
                tr: "21 Haziran 1955'te Fransa'nın Joeuf kasabasında, İtalyan göçmen bir ailenin çocuğu olarak doğdu. Nancy ve Saint-Étienne'de yetiştikten sonra 1982'de Juventus'a transfer oldu ve 1980'lerin tartışmasız kralı oldu; 1983, 1984 ve 1985'te üst üste 3 kez Ballon d'Or kazanan ilk oyuncu unvanını aldı. Bir orta saha oyuncusu olmasına rağmen inanılmaz bir gol içgüdüsüne sahipti; 1984 Avrupa Şampiyonası'nda sadece 5 maçta 9 gol atarak hâlâ kırılamamış bir turnuva rekoru kurdu ve Fransa'yı şampiyon yaptı. Serbest vuruşlardaki ustalığıyla tanınırdı. Oyunculuğu bıraktıktan sonra Fransa Milli Takımı teknik direktörlüğü, UEFA başkanlığı gibi görevler üstlendi; başkanlık döneminde yaşanan tartışmalar futbol yönetimindeki kariyerini gölgeledi.",
                en: "Born on 21 June 1955 in Joeuf, France, to a family of Italian immigrants. After coming through the ranks at Nancy and Saint-Étienne, he transferred to Juventus in 1982 and became the undisputed king of the 1980s, becoming the first player to win 3 consecutive Ballon d'Ors, in 1983, 1984, and 1985. Despite playing as a midfielder, he had an extraordinary scoring instinct, netting 9 goals in just 5 matches at Euro 1984, a tournament record that still stands, as he led France to the title. He was renowned for his mastery of free kicks. After retiring, he managed the French national team and later served as UEFA president, though controversies during his presidency later overshadowed his administrative career.",
                es: "Nació el 21 de junio de 1955 en Joeuf, Francia, en una familia de inmigrantes italianos. Tras formarse en el Nancy y el Saint-Étienne, fichó por la Juventus en 1982 y se convirtió en el rey indiscutible de los años 80, siendo el primer jugador en ganar 3 Balones de Oro consecutivos, en 1983, 1984 y 1985. A pesar de jugar como centrocampista, tenía un instinto goleador extraordinario, marcando 9 goles en solo 5 partidos en la Eurocopa 1984, un récord del torneo que aún se mantiene, llevando a Francia al título. Era reconocido por su maestría en los tiros libres. Tras retirarse, dirigió a la selección francesa y luego fue presidente de la UEFA, aunque controversias durante su presidencia empañaron después su carrera administrativa."
              }},
            { id: 23, name: "Dennis Bergkamp", flag: "🇳🇱", wikiTitle: "Dennis_Bergkamp", birthDate: "1969-05-10",
              birthPlace: { tr: "Amsterdam, Hollanda", en: "Amsterdam, Netherlands", es: "Ámsterdam, Países Bajos" },
              story: {
                tr: "10 Mayıs 1969'da Amsterdam'da doğdu; adı, doğduğu gün Ajax'ın Avrupa'da oynadığı maçtaki oyuncu Dennis Neville'e ithafen konuldu. Ajax'ta yetişti, Inter'de zorlu bir dönem geçirdikten sonra 1995'te Arsenal'e transfer oldu ve kulüp tarihinin en sevilen oyuncularından biri haline geldi. Uçak korkusu nedeniyle kariyerinin büyük bölümünde deplasman maçlarına kara yoluyla gitti; bu yüzden 'Uçamayan Hollandalı' lakabını aldı. Buz pateni yapar gibi zarif hareket kabiliyeti ve topu kontrol etme yeteneğiyle tanınırdı. 1998 Dünya Kupası çeyrek finalinde Arjantin'e attığı göğüs kontrolü ve çevirmeyle bitirdiği gol, futbol tarihinin en estetik gollerinden sayılır. Arsenal'in 'Invincibles' kadrosunun kilit ismiydi. Emekliliğinin ardından Ajax'ta teknik direktör yardımcılığı yaptı.",
                en: "Born on 10 May 1969 in Amsterdam; he was named after Denis Neville, an Ajax player who featured in a European match on the day of his birth. He came through the Ajax academy, endured a difficult spell at Inter, and transferred to Arsenal in 1995, becoming one of the most beloved players in the club's history. Due to a fear of flying, he traveled to most away matches over land for the majority of his career, earning him the nickname 'The Non-Flying Dutchman'. He was known for his elegant, almost skater-like ball control. His chest-controlled, spinning finish against Argentina in the 1998 World Cup quarter-final is considered one of the most beautiful goals in football history. He was a key figure in Arsenal's 'Invincibles' squad. After retiring, he became assistant coach at Ajax.",
                es: "Nació el 10 de mayo de 1969 en Ámsterdam; le pusieron el nombre en honor a Denis Neville, un jugador del Ajax que participó en un partido europeo el día de su nacimiento. Se formó en la cantera del Ajax, pasó por un difícil período en el Inter, y fichó por el Arsenal en 1995, convirtiéndose en uno de los jugadores más queridos en la historia del club. Debido a su miedo a volar, viajó a la mayoría de los partidos de visitante por tierra durante gran parte de su carrera, ganándose el apodo de 'el Holandés No Volador'. Era conocido por su elegante control del balón, casi como un patinador. Su gol contra Argentina en los cuartos de final del Mundial 1998, con control de pecho y giro, es considerado uno de los goles más bellos de la historia del fútbol. Fue una figura clave en el equipo 'Invencible' del Arsenal. Tras retirarse, fue entrenador asistente en el Ajax."
              }},
            { id: 24, name: "Luka Modrić", flag: "🇭🇷", wikiTitle: "Luka_Modrić", birthDate: "1985-09-09",
              birthPlace: { tr: "Zadar, Hırvatistan", en: "Zadar, Croatia", es: "Zadar, Croacia" },
              story: {
                tr: "9 Eylül 1985'te Hırvatistan'ın Zadar kentinde doğdu. 6 yaşındayken Hırvatistan Bağımsızlık Savaşı sırasında büyükbabası öldürüldü ve ailesi mülteci olarak bir otelde yaşamak zorunda kaldı; çocukluğu savaşın gölgesinde geçti. Cılız fiziği nedeniyle birçok altyapı takımından reddedildi, ancak pes etmedi. Dinamo Zagreb ve Tottenham'da yeteneğini kanıtladıktan sonra 2012'de Real Madrid'e transfer oldu. Zekası, vizyonu ve tükenmek bilmeyen enerjisiyle kulübün orta saha beyni oldu, 5 Şampiyonlar Ligi kazandı. 2018 Dünya Kupası'nda küçük Hırvatistan'ı finale taşıyarak turnuvanın en iyi oyuncusu seçildi ve aynı yıl Messi-Ronaldo hegemonyasını 10 yıl sonra kırarak Ballon d'Or kazandı. 40'lı yaşlarına yaklaşırken hâlâ üst düzey futbol oynamaya devam ediyor.",
                en: "Born on 9 September 1985 in Zadar, Croatia. At age 6, during the Croatian War of Independence, his grandfather was killed and his family was forced to live as refugees in a hotel; his childhood unfolded in the shadow of war. Rejected by many youth teams for his frail physique, he never gave up. After proving himself at Dinamo Zagreb and Tottenham, he transferred to Real Madrid in 2012. With his intelligence, vision, and boundless energy, he became the brain of the club's midfield, winning 5 Champions Leagues. He led tiny Croatia to the 2018 World Cup final and was named the tournament's best player, and that same year broke the decade-long Messi-Ronaldo hegemony to win the Ballon d'Or. Now approaching his 40s, he continues to play top-level football.",
                es: "Nació el 9 de septiembre de 1985 en Zadar, Croacia. A los 6 años, durante la Guerra de Independencia de Croacia, su abuelo fue asesinado y su familia se vio obligada a vivir como refugiada en un hotel; su infancia transcurrió a la sombra de la guerra. Rechazado por muchos equipos juveniles por su físico frágil, nunca se rindió. Tras demostrar su valía en el Dinamo Zagreb y el Tottenham, fichó por el Real Madrid en 2012. Con su inteligencia, visión y energía inagotable, se convirtió en el cerebro del mediocampo del club, ganando 5 Champions League. Llevó a la pequeña Croacia a la final del Mundial 2018 y fue nombrado mejor jugador del torneo, y ese mismo año rompió la hegemonía de una década de Messi y Ronaldo para ganar el Balón de Oro. Acercándose a los 40 años, sigue jugando fútbol de alto nivel."
              }},
            { id: 25, name: "Kaká", flag: "🇧🇷", wikiTitle: "Kaká", birthDate: "1982-04-22",
              birthPlace: { tr: "Gama, Brasília, Brezilya", en: "Gama, Brasília, Brazil", es: "Gama, Brasilia, Brasil" },
              story: {
                tr: "Gerçek adı Ricardo Izecson dos Santos Leite olan Kaká, 22 Nisan 1982'de Brezilya'nın başkenti Brasília'ya bağlı Gama kentinde, orta sınıf bir mühendis ailesinde doğdu. 18 yaşında bir havuz kazasında omurgasını kırdı ve doktorlar bir daha yürüyemeyeceğini söyledi, ancak mucizevi bir iyileşme süreciyle futbola geri döndü; bu deneyim onun derin Hristiyan inancının temeli oldu, gol attıktan sonra gökyüzünü işaret etmesi bu yüzdendir. São Paulo'da başladığı kariyerini AC Milan'da zirveye taşıdı; zarif duruşu, hızı ve yaratıcılığıyla 2007 Şampiyonlar Ligi'ni kazandı ve aynı yıl Ballon d'Or ile FIFA Yılın Futbolcusu ödüllerini aldı — bu dönem futbolun Messi-Ronaldo düellosundan önceki son büyük 'tek yıldız' zaferlerinden biri sayılır. 2009'da dönemin rekor bedeliyle Real Madrid'e transfer oldu. 2002 Dünya Kupası'nda Brezilya ile şampiyon oldu. Kariyerinin sonunda Orlando City'de oynadı, sahadaki centilmenliği ve olgun kişiliğiyle futbolun en saygın figürlerinden biri olarak anılıyor.",
                en: "Born Ricardo Izecson dos Santos Leite on 22 April 1982 in Gama, near Brazil's capital Brasília, to a middle-class engineering family. At 18 he broke his spine in a swimming pool accident and doctors said he might never walk again, but a remarkable recovery brought him back to football; that experience deepened his Christian faith, which is why he points to the sky after scoring goals. After starting his career at São Paulo, he reached his peak at AC Milan, where his elegant style, pace, and creativity won the 2007 Champions League, and that same year he claimed both the Ballon d'Or and FIFA World Player of the Year — a period considered one of the last great 'single superstar' triumphs before the Messi-Ronaldo duopoly began. In 2009 he moved to Real Madrid for a then-record fee. He was a World Cup champion with Brazil in 2002. He finished his career at Orlando City, remembered as one of football's most respected and gracious figures on and off the pitch.",
                es: "Nacido como Ricardo Izecson dos Santos Leite el 22 de abril de 1982 en Gama, cerca de Brasilia, en una familia de clase media de ingenieros. A los 18 años se rompió la columna en un accidente en una piscina y los médicos dijeron que quizás nunca volvería a caminar, pero una recuperación extraordinaria lo trajo de vuelta al fútbol; esa experiencia profundizó su fe cristiana, por lo que señala al cielo después de marcar goles. Tras comenzar su carrera en el São Paulo, alcanzó su punto máximo en el AC Milan, donde su estilo elegante, velocidad y creatividad le dieron la Champions League 2007, y ese mismo año se llevó tanto el Balón de Oro como el premio FIFA al Mejor Jugador del Mundo, un período considerado uno de los últimos grandes triunfos de 'superestrella individual' antes del duopolio Messi-Ronaldo. En 2009 fichó por el Real Madrid por una cifra entonces récord. Fue campeón del mundo con Brasil en 2002. Terminó su carrera en el Orlando City, recordado como una de las figuras más respetadas y elegantes del fútbol dentro y fuera de la cancha."
              }}
        ];

        // --- STATE ---
        let currentLang = 'tr';
        let searchQuery = '';
        let selectedPlayer = null;
        let currentFilter = 'all';
        let favorites = [];
        let isSpeaking = false;
        let currentUtterance = null;
        let speakKeepAliveTimer = null;
        let toastTimeout = null;
        const photoCache = {}; // wikiTitle -> url | null

        // --- DOM ---
        const splashScreen = document.getElementById('splash-screen');
        const gridContainer = document.getElementById('grid-container');
        const searchInput = document.getElementById('search-input');
        const homeView = document.getElementById('home-view');
        const detailView = document.getElementById('detail-view');
        const toastEl = document.getElementById('toast');
        const shareOverlay = document.getElementById('share-modal-overlay');

        window.addEventListener('DOMContentLoaded', () => {
            loadFavorites();

            setTimeout(() => {
                splashScreen.classList.add('splash-hidden');
                setTimeout(() => splashScreen.style.display = 'none', 800);
            }, 2500);

            // Ses motorunu erkenden ısıt (bazı tarayıcılarda ilk çağrıda gecikme/başarısızlık olur)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }

            updateUI();
            renderGrid();
        });

        // --- FAVORİLER ---
        function loadFavorites() {
            try {
                const saved = localStorage.getItem('futstory_favorites');
                favorites = saved ? JSON.parse(saved) : [];
            } catch (e) { favorites = []; }
        }
        function saveFavorites() {
            try { localStorage.setItem('futstory_favorites', JSON.stringify(favorites)); } catch (e) {}
        }
        function isFavorite(id) { return favorites.includes(id); }
        function toggleFavorite(id, event) {
            if (event) event.stopPropagation();
            const ui = uiTranslations[currentLang];
            if (isFavorite(id)) {
                favorites = favorites.filter(f => f !== id);
                showToast(ui.favRemoved);
            } else {
                favorites.push(id);
                showToast(ui.favAdded);
            }
            saveFavorites();
            renderGrid();
            if (selectedPlayer && selectedPlayer.id === id) updateDetailFavButton();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('chip-all').classList.toggle('active', filter === 'all');
            document.getElementById('chip-favorites').classList.toggle('active', filter === 'favorites');
            renderGrid();
        }

        function setLang(lang) {
            currentLang = lang;
            ['tr', 'en', 'es'].forEach(l => {
                const btn = document.getElementById(`btn-${l}`);
                btn.className = l === lang
                    ? "lang-btn uppercase text-xs font-bold px-3 py-1.5 rounded-full transition-colors bg-yellow-500 text-slate-900 shadow-md"
                    : "lang-btn uppercase text-xs font-bold px-3 py-1.5 rounded-full transition-colors text-slate-400 hover:text-white";
            });
            stopSpeak();
            updateUI();
            if (selectedPlayer) renderDetail(); else renderGrid();
        }

        function updateUI() {
            const ui = uiTranslations[currentLang];
            searchInput.placeholder = ui.searchPlaceholder;
            document.getElementById('back-text').innerText = ui.back;
            document.getElementById('youtube-text').innerText = ui.watchYoutube;
            document.getElementById('splash-tagline').innerText = ui.tagline;
            document.getElementById('chip-all').innerText = ui.allTab;
            document.getElementById('chip-favorites').innerText = ui.favTab;
            document.getElementById('detail-share-text').innerText = ui.share;
            document.getElementById('share-modal-title').innerText = ui.shareModalTitle;
            document.getElementById('share-opt-system').innerText = ui.shareSystem;
            document.getElementById('share-opt-copy').innerText = ui.shareCopy;
            document.getElementById('share-opt-cancel').innerText = ui.shareCancel;
            updateDetailFavButton();
            updateDetailSpeakButton();
        }

        function handleSearch(val) {
            searchQuery = val.toLowerCase();
            renderGrid();
        }

        // --- FOTOĞRAF YÜKLEME (Wikipedia'dan gerçek fotoğraf) ---
        async function loadPlayerPhoto(wikiTitle, imgEl, fallbackEl) {
            if (photoCache.hasOwnProperty(wikiTitle)) {
                const cached = photoCache[wikiTitle];
                if (cached && imgEl) {
                    imgEl.src = cached;
                    imgEl.onload = () => { imgEl.classList.add('loaded'); if (fallbackEl) fallbackEl.style.display = 'none'; };
                }
                return;
            }
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
                if (!res.ok) throw new Error('no data');
                const data = await res.json();
                const rawSrc = data.thumbnail && data.thumbnail.source ? data.thumbnail.source : null;
                const src = rawSrc ? rawSrc.replace(/\/\d+px-/, '/400px-') : null;
                photoCache[wikiTitle] = src;
                if (src && imgEl) {
                    imgEl.src = src;
                    imgEl.onload = () => { imgEl.classList.add('loaded'); if (fallbackEl) fallbackEl.style.display = 'none'; };
                    imgEl.onerror = () => { imgEl.classList.remove('loaded'); if (fallbackEl) fallbackEl.style.display = ''; };
                }
            } catch (e) {
                photoCache[wikiTitle] = null;
            }
        }

        // --- GRID ---
        function renderGrid() {
            const ui = uiTranslations[currentLang];
            let pool = playersData;
            if (currentFilter === 'favorites') pool = pool.filter(p => isFavorite(p.id));
            const filteredPlayers = pool.filter(p => p.name.toLowerCase().includes(searchQuery));

            if (filteredPlayers.length === 0) {
                const msg = currentFilter === 'favorites' ? ui.noFavResult : ui.noResult;
                gridContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-48 text-slate-500 text-center px-6">
                        <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p>${msg}</p>
                    </div>`;
                return;
            }

            let html = '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">';
            filteredPlayers.forEach(player => {
                const fav = isFavorite(player.id);
                html += `
                    <button onclick="selectPlayer(${player.id})" class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center text-center group cursor-pointer focus:outline-none">
                        <div class="fav-btn-card" onclick="toggleFavorite(${player.id}, event)">
                            <svg fill="${fav ? '#fbbf24' : 'none'}" stroke="${fav ? '#fbbf24' : '#94a3b8'}" viewBox="0 0 24 24" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                        </div>
                        <div class="player-photo-wrap" id="photo-wrap-${player.id}">
                            <img id="photo-img-${player.id}" alt="${player.name}">
                            <span id="photo-fallback-${player.id}" class="flag-fallback">${player.flag}</span>
                        </div>
                        <h2 class="font-bold text-sm md:text-base text-slate-200 group-hover:text-yellow-400 transition-colors">${player.name}</h2>
                    </button>`;
            });
            html += '</div>';
            gridContainer.innerHTML = html;

            // Fotoğrafları arka planda yükle
            filteredPlayers.forEach(player => {
                const imgEl = document.getElementById(`photo-img-${player.id}`);
                const fallbackEl = document.getElementById(`photo-fallback-${player.id}`);
                loadPlayerPhoto(player.wikiTitle, imgEl, fallbackEl);
            });
        }

        // --- OYUNCU SEÇİMİ / DETAY ---
        function selectPlayer(id) {
            stopSpeak();
            selectedPlayer = playersData.find(p => p.id === id);
            homeView.classList.add('hidden');
            detailView.classList.remove('hidden');
            renderDetail();
        }

        function formatDate(dateStr, lang) {
            const d = new Date(dateStr + 'T12:00:00');
            return new Intl.DateTimeFormat(dateLocaleMap[lang], { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
        }
        function calculateAge(birthDate, deathDate) {
            const start = new Date(birthDate + 'T12:00:00');
            const end = deathDate ? new Date(deathDate + 'T12:00:00') : new Date();
            let age = end.getFullYear() - start.getFullYear();
            const m = end.getMonth() - start.getMonth();
            if (m < 0 || (m === 0 && end.getDate() < start.getDate())) age--;
            return age;
        }

        function renderDetail() {
            if (!selectedPlayer) return;
            const ui = uiTranslations[currentLang];
            const p = selectedPlayer;

            document.getElementById('detail-flag-badge').innerText = p.flag;
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-story').innerText = `"${p.story[currentLang]}"`;

            const photoImg = document.getElementById('detail-photo-img');
            const photoFallback = document.getElementById('detail-photo-fallback');
            photoImg.classList.remove('loaded');
            photoFallback.style.display = '';
            photoFallback.innerText = p.flag;
            loadPlayerPhoto(p.wikiTitle, photoImg, photoFallback);

            document.getElementById('pill-place-label').innerText = ui.placeLabel;
            document.getElementById('pill-place-value').innerText = p.birthPlace[currentLang];

            const dateContainer = document.getElementById('pill-date-container');
            const ageContainer = document.getElementById('pill-age-container');

            if (p.deathDate) {
                dateContainer.classList.add('deceased');
                ageContainer.classList.add('deceased');
                document.getElementById('pill-date-label').innerText = ui.dateLabel;
                document.getElementById('pill-date-value').innerText = formatDate(p.birthDate, currentLang);
                document.getElementById('pill-age-label').innerText = ui.deathAgeLabel + ' • 🕊️';
                document.getElementById('pill-age-value').innerText = calculateAge(p.birthDate, p.deathDate) + ' (' + formatDate(p.deathDate, currentLang) + ')';
            } else {
                dateContainer.classList.remove('deceased');
                ageContainer.classList.remove('deceased');
                document.getElementById('pill-date-label').innerText = ui.dateLabel;
                document.getElementById('pill-date-value').innerText = formatDate(p.birthDate, currentLang);
                document.getElementById('pill-age-label').innerText = ui.ageLabel;
                document.getElementById('pill-age-value').innerText = calculateAge(p.birthDate, null);
            }

            const query = encodeURIComponent(`${p.name} documentary story biography`);
            document.getElementById('detail-youtube').href = `https://www.youtube.com/results?search_query=${query}`;

            updateDetailFavButton();
            updateDetailSpeakButton();
        }

        function updateDetailFavButton() {
            if (!selectedPlayer) return;
            const ui = uiTranslations[currentLang];
            const btn = document.getElementById('detail-fav-btn');
            const icon = document.getElementById('detail-fav-icon');
            const text = document.getElementById('detail-fav-text');
            const fav = isFavorite(selectedPlayer.id);
            btn.classList.toggle('fav-active', fav);
            icon.setAttribute('fill', fav ? 'currentColor' : 'none');
            text.innerText = fav ? ui.favorited : ui.favorite;
        }

        // --- SESLİ OKUMA (Düzeltilmiş TTS) ---
        function toggleSpeak() {
            if (!('speechSynthesis' in window)) {
                showToast(uiTranslations[currentLang].ttsUnsupported);
                return;
            }
            if (isSpeaking) stopSpeak(); else speakStory();
        }

        function pickVoice(lang) {
            const voices = window.speechSynthesis.getVoices();
            const target = speechLangMap[lang];
            return voices.find(v => v.lang === target) || voices.find(v => v.lang && v.lang.startsWith(target.split('-')[0])) || null;
        }

        function speakStory() {
            if (!selectedPlayer || !('speechSynthesis' in window)) return;

            window.speechSynthesis.cancel();

            const text = `${selectedPlayer.name}. ${selectedPlayer.story[currentLang]}`;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = speechLangMap[currentLang] || 'tr-TR';
            const voice = pickVoice(currentLang);
            if (voice) utterance.voice = voice;
            utterance.rate = 0.95;
            utterance.pitch = 1;
            utterance.volume = 1;

            utterance.onend = () => { isSpeaking = false; clearInterval(speakKeepAliveTimer); updateDetailSpeakButton(); };
            utterance.onerror = () => {
                isSpeaking = false;
                clearInterval(speakKeepAliveTimer);
                updateDetailSpeakButton();
                showToast(uiTranslations[currentLang].ttsError);
            };

            currentUtterance = utterance;
            isSpeaking = true;
            updateDetailSpeakButton();

            // Bazı Chrome/Android sürümlerinde uzun metinlerde konuşma ~15sn sonra donuyor; bu düzeltme onu engeller
            clearInterval(speakKeepAliveTimer);
            speakKeepAliveTimer = setInterval(() => {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.pause();
                    window.speechSynthesis.resume();
                }
            }, 5000);

            // Bazı tarayıcılarda ilk speak() çağrısı sessiz kalır; kısa bir gecikmeyle tekrar dene
            window.speechSynthesis.speak(utterance);
            setTimeout(() => {
                if (isSpeaking && !window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                    window.speechSynthesis.speak(utterance);
                }
            }, 250);
        }

        function stopSpeak() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            clearInterval(speakKeepAliveTimer);
            isSpeaking = false;
            updateDetailSpeakButton();
        }

        function updateDetailSpeakButton() {
            const ui = uiTranslations[currentLang];
            const btn = document.getElementById('detail-speak-btn');
            const text = document.getElementById('detail-speak-text');
            if (!btn || !text) return;
            const supported = 'speechSynthesis' in window;
            btn.disabled = !supported;
            btn.classList.toggle('speak-active', isSpeaking);
            text.innerText = supported ? (isSpeaking ? ui.stop : ui.listen) : ui.listen;
        }

        // --- PAYLAŞMA (gerçek uygulamalara gönderme) ---
        function openShareModal() {
            if (!selectedPlayer) return;
            shareOverlay.classList.add('show');
        }
        function closeShareModal(event) {
            if (event && event.target !== shareOverlay) return;
            shareOverlay.classList.remove('show');
        }

        function getShareText() {
            const p = selectedPlayer;
            return `${p.name} - FutStory\n\n"${p.story[currentLang]}"\n\n${window.location.href}`;
        }

        async function doSystemShare() {
            const ui = uiTranslations[currentLang];
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `${selectedPlayer.name} - FutStory`,
                        text: `${selectedPlayer.name} - FutStory\n\n"${selectedPlayer.story[currentLang]}"`,
                        url: window.location.href
                    });
                    showToast(ui.sharedOk);
                } catch (err) { /* kullanıcı iptal etti, sessiz geç */ }
            } else {
                await doShareTo('copy');
            }
            closeShareModal();
        }

        async function doShareTo(target) {
            const ui = uiTranslations[currentLang];
            const text = getShareText();
            const url = window.location.href;

            if (target === 'whatsapp') {
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            } else if (target === 'telegram') {
                window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(`${selectedPlayer.name} - FutStory\n\n"${selectedPlayer.story[currentLang]}"`)}`, '_blank');
            } else if (target === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`${selectedPlayer.name} - FutStory 🏆`)}&url=${encodeURIComponent(url)}`, '_blank');
            } else if (target === 'copy') {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(ui.copied);
                } catch (e) {
                    showToast(ui.copied);
                }
            }
            closeShareModal();
        }

        // --- RASTGELE EFSANE KEŞFET ---
        function randomPlayer() {
            let pool = playersData;
            if (selectedPlayer) pool = playersData.filter(p => p.id !== selectedPlayer.id);
            const randomIndex = Math.floor(Math.random() * pool.length);
            selectPlayer(pool[randomIndex].id);
        }

        // --- TOAST ---
        function showToast(message) {
            clearTimeout(toastTimeout);
            toastEl.innerText = message;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        // --- GERİ DÖN ---
        function goBack() {
            stopSpeak();
            closeShareModal();
            selectedPlayer = null;
            searchInput.value = '';
            searchQuery = '';
            detailView.classList.add('hidden');
            homeView.classList.remove('hidden');
            renderGrid();
        }
    </script>
</body>
</html>
