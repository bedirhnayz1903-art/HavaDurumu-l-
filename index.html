<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Asistanım</title>
    <style>
        /* Genel Sayfa Ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* LOGO KODU (İstediğin Köşe Logosu) */
        .assistant-logo {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 15px; /* Hafif karemsi modern tasarım */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(110, 142, 251, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .assistant-logo:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .assistant-logo span {
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 1px;
        }

        /* Asistan Arayüzü */
        .chat-container {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #bbb;
            font-size: 14px;
        }

        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2c2c2c;
            color: white;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #6e8efb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #5a79e0;
        }
    </style>
</head>
<body>

    <div class="assistant-logo">
        <span>BX</span>
    </div>

    <div class="chat-container">
        <h1>Asistanıma Hoş Geldin</h1>
        <p>Sana bugün nasıl yardımcı olabilirim?</p>
        
        <div class="input-area">
            <input type="text" placeholder="Bir şeyler yazın...">
            <button>Gönder</button>
        </div>
    </div>

</body>
</html>
